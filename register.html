<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Einladung annehmen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; }
        input { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; }
        input:focus { background-color: white; border-color: #687451; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); outline: none; }
        .btn-primary { background-color: #687451; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(104, 116, 81, 0.2); }
    </style>
</head>
<body class="font-sans text-hb-offblack min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Zurück Button (Login) -->
    <a href="index.html" class="absolute top-6 left-6 md:top-10 md:left-10 flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-hb-olive transition-colors z-20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Zurück zum Login
    </a>

    <!-- Dezente Hintergrund-Dekoration -->
    <div class="fixed top-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-hb-olive/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-5%] w-[40vw] h-[40vw] bg-hb-orange/5 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Register Container -->
    <div class="w-full max-w-lg bg-white p-8 md:p-10 rounded-[15px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 relative z-10 my-10">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-hb-ultralight rounded-2xl mx-auto flex items-center justify-center mb-4 text-hb-olive">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-hb-offblack">Willkommen im Haus!</h1>
            <p class="text-sm text-gray-500 font-medium mt-2 leading-relaxed">Bitte geben Sie Ihren Einladungscode ein, um Ihren Account zu aktivieren und Ihr Passwort festzulegen.</p>
        </div>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest mb-1">Einladungscode</label>
                <input type="text" id="invite_code" class="w-full p-4 text-sm font-mono tracking-widest uppercase text-center border-hb-olive/30 bg-hb-olive/5 focus:bg-white" placeholder="z.B. HB-X7V2A" required>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">Vollständiger Name</label>
                    <input type="text" id="full_name" class="w-full p-4 text-sm" placeholder="Vorname Nachname" required>
                </div>
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">E-Mail Adresse</label>
                    <input type="email" id="email" class="w-full p-4 text-sm" placeholder="name@beispiel.de" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">Passwort</label>
                    <input type="password" id="password" class="w-full p-4 text-sm" placeholder="Mind. 6 Zeichen" required minlength="6">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">Passwort bestätigen</label>
                    <input type="password" id="password_confirm" class="w-full p-4 text-sm" placeholder="Wiederholen" required minlength="6">
                </div>
            </div>
            
            <div id="error-msg" class="hidden bg-red-50 text-red-600 text-xs font-bold p-3 rounded-[15px] border border-red-100 text-center mt-4"></div>
            <div id="success-msg" class="hidden bg-green-50 text-green-700 text-xs font-bold p-4 rounded-[15px] border border-green-100 text-center mt-4">
                Registrierung erfolgreich! Sie werden in wenigen Sekunden zum Login weitergeleitet...
            </div>

            <button type="submit" id="register-btn" class="w-full btn-primary py-4 text-sm mt-4">Account aktivieren</button>
        </form>
    </div>

    <script>
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Falls in der URL ein Code mitgegeben wurde (z.B. ?code=HB-12345), direkt ins Feld eintragen
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('code')) {
            document.getElementById('invite_code').value = urlParams.get('code');
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errBox = document.getElementById('error-msg');
            const successBox = document.getElementById('success-msg');
            
            const code = document.getElementById('invite_code').value.trim().toUpperCase();
            const name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            const pwdConfirm = document.getElementById('password_confirm').value;

            errBox.classList.add('hidden');

            if (pwd !== pwdConfirm) {
                errBox.textContent = 'Die Passwörter stimmen nicht überein.';
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Prüfe Einladung...';

            try {
                // 1. Prüfen ob der Einladungscode existiert
                const { data: inviteData, error: inviteError } = await _supabase.from('invitations').select('*').eq('code', code).single();
                
                if (inviteError || !inviteData) {
                    errBox.textContent = 'Ungültiger Einladungscode. Bitte überprüfen Sie Ihre Eingabe.';
                    errBox.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Account aktivieren';
                    return;
                }
                
                btn.textContent = 'Erstelle Account...';
                
                // 2. Auth User erstellen
                const { data: authData, error: authError } = await _supabase.auth.signUp({ 
                    email: email, 
                    password: pwd 
                });

                if (authError) throw authError;

                // 3. Profil anlegen mit der korrekten ID und dem Apartment aus der Einladung
                const { error: profileError } = await _supabase.from('profiles').insert([{
                    id: authData.user.id,
                    full_name: name,
                    email: email,
                    role: 'tenant',
                    apartment_id: inviteData.apartment_id 
                }]);

                if(profileError && profileError.code !== '23505') { 
                    console.log("Profile insert status:", profileError);
                }

                // 4. Einladung als erledigt markieren/löschen (damit der Code nur einmal gilt)
                await _supabase.from('invitations').delete().eq('code', code);

                // Erfolgsmeldung & Redirect
                document.getElementById('register-form').style.display = 'none';
                successBox.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = 'index.html'; // Zurück zum Login
                }, 3000);

            } catch (error) {
                errBox.textContent = error.message === 'User already registered' ? 'Diese E-Mail ist bereits registriert.' : 'Fehler: ' + error.message;
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Account aktivieren';
            }
        });
    </script>
</body>
</html>
