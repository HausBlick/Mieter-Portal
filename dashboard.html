        tailwind.config = {

                extend: {

    <style>
        body { background-color: #F9FAF8; font-size: 16px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        
        .nav-link { border-radius: 15px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; font-weight: 600; box-shadow: 0 4px 10px rgba(104, 116, 81, 0.2); }
        .active-link svg { stroke: white !important; }
        
        input, select, textarea { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 12px 16px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); outline: none; }
        input[type="checkbox"] { border-radius: 4px; width: 1.2rem; height: 1.2rem; accent-color: #EB762D; cursor: pointer; padding: 0; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .btn-primary { background-color: #687451; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(104, 116, 81, 0.2); }
        .btn-secondary { background-color: #373737; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-secondary:hover { background-color: #2a2a2a; transform: translateY(-1px); }

        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }

        .message-appear { animation: fadeInScale 0.2s ease-out forwards; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Profile Dropdown logic */
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-hb-orange' : 'bg-hb-olive';
            toast.className = `${bgColor} text-white px-8 py-5 rounded-[15px] shadow-2xl flex items-center gap-4 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `<span class="text-base font-bold tracking-wide">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleUserDropdown(event) {
            event.stopPropagation();
            document.getElementById('user-dropdown').classList.toggle('dropdown-open');
        }

        function closeDropdowns(event) {
            const dropdown = document.getElementById('user-dropdown');
            if (dropdown && !event.target.closest('.dropdown-container')) {
                dropdown.classList.remove('dropdown-open');
            }
        }

        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                // 1. Profil laden
                const { data: profile, error: profileError } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                
                if (profileError || !profile) { 
                    document.getElementById('welcome-title').textContent = profileError ? `Fehler: ${profileError.message}` : "Profil nicht gefunden."; 
                    document.getElementById('role-label').textContent = "SYSTEMFEHLER";
                    return; 
                }
                userProfile = profile;

                // 2. Wohnung laden (falls Mieter)
                if (userProfile.role === 'tenant' && userProfile.apartment_id) {
                    const { data: aptData } = await _supabase.from('apartments').select('building_id').eq('id', userProfile.apartment_id).single();
                    if (aptData) userProfile.apartments = { building_id: aptData.building_id };
                }

                const firstName = profile.full_name ? profile.full_name.split(' ')[0] : 'Nutzer';
                
                // Header-Werte setzen
                document.getElementById('welcome-title').textContent = "Hallo, " + firstName + "!";
                document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';
                document.getElementById('user-avatar').textContent = firstName.charAt(0).toUpperCase();
                document.getElementById('dropdown-name').textContent = profile.full_name || 'Kein Name';
                document.getElementById('dropdown-email').textContent = profile.email;

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

            if (role === 'admin') {
                nav.innerHTML = `

                    <li class="${sectionClass}">Kommunikation</li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Mieter-Tickets</a></li>
                    <li class="${sectionClass}">Mieterverwaltung</li>
                    <li><a onclick="loadUserManagement(); setActiveNav('nav-users')" id="nav-users" class="${itemClass}">${icons.users} Meine Mieter</a></li>
                    <li><a onclick="loadTenants(); setActiveNav('nav-apartments')" id="nav-apartments" class="${itemClass}">${icons.buildings} Objekte & Einheiten</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Dokumente</a></li>
                    <li class="${sectionClass}">Service</li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            } else {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Meine Tickets</a></li>

        function setActiveNav(id) {
            if(currentChatInterval) clearInterval(currentChatInterval);
            document.querySelectorAll('#nav-links a').forEach(el => el.classList.remove('active-link'));
            const activeEl = document.getElementById(id);
            if (activeEl) activeEl.classList.add('active-link');
            if(window.innerWidth < 768) toggleMenu();
        }

        function formatText(text) {
            if (!text) return "";
            let formatted = text
                .replace(/^---$/gm, '<hr class="my-8 border-gray-100">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="text-hb-olive underline font-bold hover:text-hb-orange transition-colors">$1</a>')
                .replace(/^- (.*$)/gim, '<li>$1</li>');
            if (formatted.includes('<li>')) formatted = `<ul class="list-disc pl-6 space-y-2 my-4">${formatted}</ul>`;
            return formatted.split('\n').join('<br>');
        }

        // --- ZENTRALE VORSCHAU FUNKTION & "NEU" STATUS ENTFERNEN ---
        async function viewDoc(docId, path, readByStr, bucket = 'documents') {
            // "Neu" Flag reparieren, falls es die Dokumentencloud ist
            if (docId && bucket === 'documents' && userProfile.role === 'tenant') {
                 let readBy = [];
                 try { readBy = JSON.parse(readByStr); } catch(e){}
                 
                 if(!readBy.includes(currentUser.id)) {
                     readBy.push(currentUser.id);
                     // Im Hintergrund updaten, damit die Liste beim nächsten Laden stimmt
                     _supabase.from('documents').update({read_by: readBy}).eq('id', docId).then(() => {
                         if(document.getElementById('docs-content')) fetchDocuments(); 
                     });
                 }
            }

            // Signed URL für die temporäre Vorschau im Browser generieren
            const { data, error } = await _supabase.storage.from(bucket).createSignedUrl(path, 3600); 
            if (error) { 
                showToast("Fehler beim Öffnen der Datei", "error"); 
                return; 
            }
            window.open(data.signedUrl, '_blank');
        }

        async function handleUpload(e) {
            e.preventDefault();
            const file = document.getElementById('file-input').files[0];
            const btn = document.getElementById('upload-btn');
            if (!file) return;
            btn.disabled = true; btn.textContent = "Upload...";
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await _supabase.storage.from('documents').upload(fileName, file);
            if (!uploadError) {
                await _supabase.from('documents').insert([{
                    title: document.getElementById('doc_title').value,
                    category: document.getElementById('doc_category').value,
                    file_path: uploadData.path,
                    tenant_id: document.getElementById('doc_tenant_id').value || null
                }]);
                showToast("Dokument gespeichert!"); loadDocuments();
            } else { showToast("Fehler", "error"); btn.disabled = false; }
        }

        function handleDocSearch(val) { docSearchQuery = val; renderDocsFeed(); }
        function handleDocFilter(val) { docCategoryFilter = val; renderDocsFeed(); }

        async function fetchDocuments() {
            const isAdmin = userProfile.role === 'admin';
            let query = _supabase.from('documents').select('*, profiles:tenant_id (full_name)');
            if (!isAdmin) query = query.or(`tenant_id.is.null,tenant_id.eq.${currentUser.id}`);
            
            const { data } = await query;
            if (data) {
                allDocs = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                renderDocsFeed();
            }
        }

        function renderDocsFeed() {
            const list = document.getElementById('docs-content');
            const isAdmin = userProfile.role === 'admin';

            let filtered = allDocs.filter(d => {
                const matchesSearch = d.title.toLowerCase().includes(docSearchQuery.toLowerCase());
                const matchesCat = docCategoryFilter === "" || d.category === docCategoryFilter;
                return matchesSearch && matchesCat;
            });

            if (filtered.length > 0) {
                // Eigene Sortierung: Für Mieter ungelesene Dokumente immer nach oben!
                if(!isAdmin) {
                    filtered.sort((a, b) => {
                        const aReadBy = a.read_by || [];
                        const bReadBy = b.read_by || [];
                        const aUnread = !aReadBy.includes(currentUser.id);
                        const bUnread = !bReadBy.includes(currentUser.id);
                        if (aUnread && !bUnread) return -1;
                        if (!aUnread && bUnread) return 1;
                        return 0; // Danach greift die ursprüngliche Datums-Sortierung
                    });
                }

                list.innerHTML = filtered.map(doc => {
                    const readBy = doc.read_by || [];
                    const isUnread = !isAdmin && !readBy.includes(currentUser.id);
                    const unreadBadge = isUnread ? `<span class="px-2.5 py-1 bg-red-100 text-red-600 rounded text-[9px] font-black uppercase tracking-widest ml-3 shadow-sm inline-flex items-center">NEU</span>` : '';
                    
                    const dateObj = new Date(doc.created_at);
                    const dateStr = dateObj.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' <span class="text-gray-400 font-normal">, ' + dateObj.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'}) + ' Uhr</span>';
                    
                    const targetInfo = isAdmin && doc.profiles?.full_name ? `<p class="text-[10px] uppercase tracking-widest font-bold text-hb-orange mt-1">Sichtbar für: ${doc.profiles.full_name}</p>` : '';

                    return `
                    <tr class="hover:bg-gray-50/50 transition-colors group">
                        <td class="p-5 align-middle border-b border-gray-50">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl bg-hb-ultralight flex items-center justify-center text-hb-olive flex-shrink-0 group-hover:bg-white shadow-sm border border-gray-100">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                </div>
                                <div>
                                    <p class="font-extrabold text-hb-offblack flex items-center text-base">${doc.title} ${unreadBadge}</p>
                                    ${targetInfo}
                                </div>
                            </div>
                        </td>
                        <td class="p-5 align-middle hidden md:table-cell border-b border-gray-50">
                            <span class="px-3 py-1.5 bg-white border border-gray-200 text-gray-600 text-[10px] font-extrabold uppercase tracking-widest rounded-lg shadow-sm">${doc.category}</span>
                        </td>
                        <td class="p-5 align-middle hidden lg:table-cell text-sm font-semibold text-gray-600 border-b border-gray-50">
                            ${dateStr}
                        </td>
                        <td class="p-5 align-middle text-right border-b border-gray-50">
                            <div class="flex justify-end items-center gap-2">
                                <button onclick="viewDoc('${doc.id}', '${doc.file_path}', '${JSON.stringify(readBy).replace(/"/g, '&quot;')}')" class="bg-white border border-hb-olive text-hb-olive hover:bg-hb-olive hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-2">
                                    Anzeigen <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                </button>
                                ${isAdmin ? `<button onclick="deleteDoc('${doc.id}', '${doc.file_path}')" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-2 rounded-xl transition-all opacity-0 group-hover:opacity-100" title="Dokument löschen"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>` : ''}
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            } else {
                list.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-base text-gray-400 italic">Keine Dokumente für diese Kriterien gefunden.</td></tr>';
            }
        }


        /* --- 5. KONTAKTBUCH --- */
        async function loadContacts() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            container.innerHTML = `
                <div class="card p-10 text-left">
                    <h2 class="text-2xl font-extrabold mb-10 text-left">Kontaktbuch</h2>
                    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-6 rounded-r-2xl mb-10 text-left">
                        <p class="text-base text-yellow-800 font-bold text-left text-balance">Hinweis: Diese Kontakte sind für Notfälle und Kleinreparaturen. Größere Arbeiten bedürfen der Freigabe durch den Vermieter.</p>
                    </div>
                    <div id="contacts-list" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left"></div>
                </div>`;
            fetchContacts();
        }

        async function fetchContacts() {
            const { data } = await _supabase.from('contacts').select('*').order('company');
            if(data) document.getElementById('contacts-list').innerHTML = data.map(c => `
                <div class="p-8 border border-gray-100 rounded-3xl bg-hb-ultralight/50 text-left">
                    ${c.is_emergency ? '<span class="bg-red-500 text-white px-3 py-1 rounded text-[10px] font-black uppercase mb-4 inline-block text-left">🚨 Notdienst</span>' : ''}
                    <h4 class="text-xl font-black text-hb-offblack text-left">${c.company || ''}</h4>
                    <p class="text-base font-bold text-gray-700 mt-2 text-left">${c.contact_person}</p>
                    <p class="text-xs font-black uppercase tracking-widest text-hb-olive mt-4 text-left">${c.category}</p>
                    <div class="mt-6 space-y-3 text-left">
                        ${c.phone ? `<p class="text-base font-bold text-left">📞 ${c.phone}</p>` : ''}
                        ${c.mobile ? `<p class="text-base font-bold text-left">📱 ${c.mobile}</p>` : ''}
                        ${c.email ? `<p class="text-base font-bold text-left">✉️ ${c.email}</p>` : ''}
                    </div>
                </div>`).join('');
        }

        /* --- TICKETS BOARD & CHAT --- */
        async function fetchTicketsBoard() {
            const isAdmin = userProfile.role === 'admin';
            let query = _supabase.from('tickets').select('*, profiles!tickets_tenant_id_fkey(full_name)').neq('status', 'Erledigt').order('created_at', { ascending: false });
            if (!isAdmin) query = query.eq('tenant_id', currentUser.id);

            const { data, error } = await query;
            if (error) return showToast(error.message, "error");

            if (isAdmin) {
                const nT = data.filter(t => t.status === 'Neu' || t.status === 'Offen');
                const pT = data.filter(t => t.status === 'In Bearbeitung');
                const hT = data.filter(t => t.status === 'Wartend');

                document.getElementById('count-new').textContent = nT.length;
                document.getElementById('count-progress').textContent = pT.length;
                document.getElementById('count-hold').textContent = hT.length;

                document.getElementById('board-new').innerHTML = nT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-sm text-gray-400 font-bold text-left">Leer</div>';
                document.getElementById('board-progress').innerHTML = pT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-sm text-gray-400 font-bold text-left">Leer</div>';
                document.getElementById('board-hold').innerHTML = hT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-sm text-gray-400 font-bold text-left">Leer</div>';
            } else {
                const list = document.getElementById('tenant-ticket-list');
                list.innerHTML = data.map(t => generateTicketCard(t)).join('') || '<p class="text-base italic text-gray-400 text-left">Keine aktiven Meldungen.</p>';
            }
        }

        async function toggleCompletedTickets() {
            showingCompletedTickets = !showingCompletedTickets;
            const container = document.getElementById('completed-tickets-list');
            
            if(showingCompletedTickets) {
                container.classList.remove('hidden');
                container.innerHTML = '<p class="text-sm text-gray-400 italic text-left">Lade...</p>';
                
                const isAdmin = userProfile.role === 'admin';
                let query = _supabase.from('tickets').select('*, profiles!tickets_tenant_id_fkey(full_name)').eq('status', 'Erledigt').order('created_at', { ascending: false });
                if (!isAdmin) query = query.eq('tenant_id', currentUser.id);

                const { data, error } = await query;
                if (error) { container.innerHTML = '<p class="text-red-500 text-left">Fehler beim Laden.</p>'; return; }

                if (data && data.length > 0) {
                    container.innerHTML = data.map(t => generateTicketCard(t, true)).join('');
                } else {
                    container.innerHTML = '<p class="text-base text-gray-400 italic text-left">Keine erledigten Tickets vorhanden.</p>';
                }
            } else {
                container.classList.add('hidden');
            }
        }

        function generateTicketCard(t, isCompleted = false) {
            const isNew = t.status === 'Neu' || t.status === 'Offen';
            let borderCol = isNew ? 'border-red-200 hover:border-red-400' : (t.status === 'In Bearbeitung' ? 'border-orange-200 hover:border-hb-orange' : 'border-gray-200 hover:border-gray-400');
            
            if(isCompleted) borderCol = 'border-gray-200 bg-gray-50 opacity-75 hover:opacity-100 hover:border-gray-400';

            return `
                <div onclick="viewTicketChat('${t.id}')" class="bg-white p-6 rounded-[15px] shadow-sm border-2 ${borderCol} cursor-pointer transition-all transform hover:-translate-y-1 text-left">
                    <div class="flex justify-between items-center mb-4 text-left">
                        <span class="text-[10px] uppercase tracking-widest font-extrabold bg-gray-100 px-3 py-1.5 rounded-lg text-gray-600 text-left">${t.category}</span>
                        <span class="text-xs font-bold text-gray-400 text-left">${new Date(t.created_at).toLocaleDateString()}</span>
                    </div>
                    <h4 class="text-base font-extrabold text-hb-offblack leading-tight mb-4 text-left text-balance">${t.title}</h4>
                    <p class="text-[11px] text-gray-500 font-bold mt-4 pt-4 border-t border-gray-50 flex items-center gap-2 text-left uppercase tracking-widest">
                        <svg class="w-4 h-4 text-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        ${t.profiles?.full_name || 'Unbekannt'}
                    </p>
                </div>
            `;
        }

        async function viewTicketChat(ticketId) {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            const { data: ticket } = await _supabase.from('tickets').select('*, profiles!tickets_tenant_id_fkey(full_name)').eq('id', ticketId).single();
            if(!ticket) return;

            container.innerHTML = `
                <div class="card flex flex-col h-[calc(100vh-140px)] overflow-hidden shadow-xl text-left border-gray-200">
                    <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row md:justify-between md:items-center bg-white z-10 shadow-sm gap-4">
                        <div class="text-left">
                            <button onclick="loadTickets(); if(currentChatInterval) clearInterval(currentChatInterval);" class="text-[10px] uppercase tracking-widest font-extrabold text-hb-olive hover:text-hb-offblack mb-2 flex items-center gap-2 transition-colors text-left bg-hb-olive/5 px-3 py-1.5 rounded-lg w-fit">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> ZURÜCK
                            </button>
                            <h2 class="text-xl md:text-2xl font-extrabold text-hb-offblack tracking-tight text-left text-balance leading-snug">${ticket.title}</h2>
                        </div>
                        ${isAdmin ? `
                            <select onchange="updateTicketStatus('${ticket.id}', this.value)" class="border-2 border-gray-100 rounded-[15px] p-3 text-sm font-extrabold focus:outline-none focus:border-hb-olive bg-gray-50 cursor-pointer text-left w-full md:w-auto">
                                <option value="Neu" ${ticket.status === 'Neu' ? 'selected' : ''}>Status: Neu</option>
                                <option value="In Bearbeitung" ${ticket.status === 'In Bearbeitung' ? 'selected' : ''}>Status: In Bearbeitung</option>
                                <option value="Wartend" ${ticket.status === 'Wartend' ? 'selected' : ''}>Status: Wartend</option>
                                <option value="Erledigt" ${ticket.status === 'Erledigt' ? 'selected' : ''}>Status: Erledigt</option>
                            </select>
                        ` : `<span class="px-5 py-3 bg-gray-50 text-hb-offblack text-sm font-extrabold rounded-[15px] border border-gray-100 text-left w-fit shadow-sm">Status: ${ticket.status}</span>`}
                    </div>

                    <div id="chat-messages" class="flex-grow overflow-y-auto p-6 md:p-8 space-y-6 chat-scroll bg-[#f4f5f1] text-left">
                        <div class="text-center text-sm italic text-gray-400 text-left">Verlauf wird geladen...</div>
                    </div>

                    <div class="p-4 md:p-6 border-t border-gray-100 bg-white text-left">
                        <form id="chat-reply-form" class="flex gap-3 md:gap-4 items-end text-left relative">
                            <div class="flex-grow relative text-left">
                                <textarea id="chat_msg_input" rows="2" class="w-full rounded-[15px] border-2 border-gray-100 p-4 pr-14 focus:outline-none focus:border-hb-olive text-base resize-none shadow-inner text-left bg-gray-50 focus:bg-white transition-colors" placeholder="Ihre Nachricht..." required></textarea>
                                <label class="absolute right-3 bottom-3 p-2 cursor-pointer text-gray-400 hover:text-hb-olive transition-colors bg-white rounded-lg shadow-sm border border-gray-50 text-left flex items-center justify-center" title="Datei anhängen">
                                    <svg class="h-5 w-5 text-left" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                                    <input type="file" id="chat_file_input" class="hidden text-left">
                                </label>
                            </div>
                            <button type="submit" id="chat-send-btn" class="bg-hb-olive text-white w-14 h-14 rounded-[15px] flex items-center justify-center hover:bg-hb-offblack transition-all shadow-md text-left flex-shrink-0 hover:-translate-y-1">
                                <svg class="h-6 w-6 text-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </form>
                        <div id="chat-file-name" class="text-[10px] text-hb-olive font-extrabold uppercase tracking-widest mt-2 ml-2 hidden flex items-center gap-1 text-left"><svg class="w-3 h-3 text-left" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg> <span class="text-left truncate max-w-xs"></span></div>
                    </div>
                </div>
            `;

            document.getElementById('chat_file_input').addEventListener('change', function() {
                const nameDisplay = document.getElementById('chat-file-name');
                if(this.files[0]) {
                    nameDisplay.querySelector('span').textContent = this.files[0].name;
                    nameDisplay.classList.remove('hidden');
                } else { nameDisplay.classList.add('hidden'); }
            });

            document.getElementById('chat-reply-form').addEventListener('submit', (e) => handleSendChatMessage(e, ticketId));
            
            await fetchChatMessages(ticketId);
            if(currentChatInterval) clearInterval(currentChatInterval);
            currentChatInterval = setInterval(() => fetchChatMessages(ticketId, true), 10000);
        }

        async function fetchChatMessages(ticketId, silent = false) {
            const { data, error } = await _supabase.from('ticket_messages').select('*, profiles!sender_id(full_name, role)').eq('ticket_id', ticketId).order('created_at', { ascending: true });
            if (error) return;

            const box = document.getElementById('chat-messages');
            if (data && data.length > 0) {
                const isAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;

                box.innerHTML = data.map(msg => {
                    const isMe = msg.sender_id === currentUser.id;
                    const wrapperClass = isMe ? "justify-end text-right" : "justify-start text-left";
                    const alignClass = isMe ? "items-end" : "items-start";
                    
                    const bgClass = isMe 
                        ? "bg-hb-olive text-white rounded-[20px] rounded-br-[4px] shadow-sm" 
                        : "bg-white text-hb-offblack border border-gray-100 rounded-[20px] rounded-bl-[4px] shadow-sm";
                    
                    const senderName = isMe ? "Ich" : (msg.profiles?.full_name || 'System');
                    
                    let attachmentHtml = "";
                    if (msg.attachment_path) {
                        const btnClass = isMe 
                            ? "bg-white/20 hover:bg-white/30 text-white border-transparent" 
                            : "bg-gray-50 hover:bg-gray-100 text-hb-olive border-gray-100";
                            
                        attachmentHtml = `
                        <div class="mt-3">
                            <button type="button" onclick="viewDoc(null, '${msg.attachment_path}', null, 'ticket_attachments')" class="text-xs font-extrabold flex items-center justify-center gap-2 w-full py-2.5 px-4 rounded-xl transition-colors border ${btnClass}">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> 
                                ANHANG VORSCHAU
                            </button>
                        </div>`;
                    }

                    // Trim entfernt unsichtbare Leerzeilen (Umbrüche) vom Ende des Textes, was die Blasen oft riesig gemacht hat
                    const cleanMessage = msg.message ? msg.message.trim() : '';

                    return `
                    <div class="flex w-full ${wrapperClass} message-appear text-left">
                        <div class="flex flex-col ${alignClass} max-w-[85%] md:max-w-[70%]">
                            <div class="flex items-center gap-2 mb-1.5 px-1">
                                <span class="text-[10px] uppercase tracking-widest text-gray-400 font-extrabold">${senderName}</span>
                                <span class="text-[10px] text-gray-400 font-medium">${new Date(msg.created_at).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="px-5 py-3 text-[15px] leading-snug whitespace-pre-wrap break-words text-left inline-block w-fit max-w-full ${bgClass}">
                                ${cleanMessage}
                                ${attachmentHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                if (!silent || isAtBottom) box.scrollTop = box.scrollHeight;
            } else { box.innerHTML = '<div class="text-center py-20 text-gray-400 italic text-sm text-left">Senden Sie Ihre erste Nachricht, um den Chat zu starten.</div>'; }
        }

        async function handleSendChatMessage(e, ticketId) {
            e.preventDefault();
            const input = document.getElementById('chat_msg_input');
            const fileInput = document.getElementById('chat_file_input');
            const btn = document.getElementById('chat-send-btn');
            const file = fileInput.files[0];
            const msgText = input.value.trim();
            if (!msgText && !file) return;

            btn.disabled = true; btn.style.opacity = '0.5';
            let attachmentPath = null;

            if (file) {
                const fileName = `${ticketId}/${Date.now()}_${file.name}`;
                const { data, error } = await _supabase.storage.from('ticket_attachments').upload(fileName, file);
                if (error) { showToast("Fehler beim Upload", "error"); btn.disabled = false; btn.style.opacity = '1'; return; }
                attachmentPath = data.path;
            }

            const { error } = await _supabase.from('ticket_messages').insert([{ ticket_id: ticketId, sender_id: currentUser.id, message: msgText, attachment_path: attachmentPath }]);
            if (error) {
                showToast("Fehler beim Senden", "error");
            } else {
                input.value = ''; fileInput.value = ''; document.getElementById('chat-file-name').classList.add('hidden');
                if(userProfile.role === 'admin') _supabase.from('tickets').update({status: 'In Bearbeitung'}).eq('id', ticketId).eq('status', 'Neu').then(()=>{});
                await fetchChatMessages(ticketId);
            }
            btn.disabled = false; btn.style.opacity = '1';
        }

        async function updateTicketStatus(id, newStatus) {
            const { error } = await _supabase.from('tickets').update({ status: newStatus }).eq('id', id);
            if (error) showToast(error.message, "error"); else showToast("Status geändert");
            fetchTicketsBoard();
            if(showingCompletedTickets) toggleCompletedTickets(); 
        }

        async function openNewTicketModal() {
            const isAdmin = userProfile.role === 'admin';
            let tenantOptions = '';
            if (isAdmin) {
                const { data: tenants } = await _supabase.from('profiles').select('id, full_name, apartments!profiles_apartment_id_fkey(apartment_number)').eq('role', 'tenant');
                tenantOptions = tenants?.map(t => `<option value="${t.id}">${t.full_name} (WE ${t.apartments?.apartment_number || ''})</option>`).join('') || '';
            }

            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="card p-8 md:p-12 text-left">
                    <div class="flex justify-between items-center mb-8 text-left">
                        <h2 class="text-2xl font-bold uppercase tracking-widest text-hb-offblack text-left">${isAdmin ? 'Ticket an Mieter senden' : 'Neue Meldung'}</h2>
                        <button onclick="loadTickets()" class="text-xs uppercase font-bold text-gray-400 hover:text-hb-orange text-left text-balance">Abbrechen</button>
                    </div>
                    <form id="new-ticket-form" class="space-y-6 text-left">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                            ${isAdmin ? `<div class="text-left"><label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Empfänger (Mieter)</label><select id="nt_tenant_id" class="w-full p-4 text-base text-left" required><option value="" disabled selected>Bitte wählen...</option>${tenantOptions}</select></div>` : ''}
                            <div class="${isAdmin ? '' : 'col-span-2 md:col-span-1'} text-left">
                                <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Kategorie</label>
                                <select id="nt_category" class="w-full p-4 text-base text-left" required>
                                    <option value="Reparatur">Reparatur / Mangel</option><option value="Allgemein">Allgemeine Anfrage</option><option value="Termin">Termin</option>
                                    ${isAdmin ? '<option value="Mahnung">Verwarnung</option>' : '<option value="Beschwerde">Beschwerde</option>'}
                                </select>
                            </div>
                            <div class="col-span-1 md:col-span-2 text-left">
                                <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Betreff</label>
                                <input type="text" id="nt_title" class="w-full p-4 text-base text-left" placeholder="Zusammenfassung..." required>
                            </div>
                        </div>
                        <div class="text-left">
                            <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Nachricht</label>
                            <textarea id="nt_message" rows="5" class="w-full p-4 text-base text-left" placeholder="Beschreiben Sie das Anliegen..." required></textarea>
                        </div>
                        <div class="pt-4 flex justify-end text-left">
                            <button type="submit" id="nt-submit-btn" class="btn-primary px-10 py-4 text-base text-left">Ticket Eröffnen</button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('new-ticket-form').addEventListener('submit', createNewTicketProcess);
        }

        async function createNewTicketProcess(e) {
            e.preventDefault();
            const btn = document.getElementById('nt-submit-btn');
            btn.disabled = true; btn.textContent = "Erstelle...";
            const isAdmin = userProfile.role === 'admin';
            const targetTenantId = isAdmin ? document.getElementById('nt_tenant_id').value : currentUser.id;
            
            const { data: newTicket, error: ticketError } = await _supabase.from('tickets').insert([{
                title: document.getElementById('nt_title').value, category: document.getElementById('nt_category').value, tenant_id: targetTenantId, creator_id: currentUser.id, description: document.getElementById('nt_message').value, status: 'Neu'
            }]).select('id').single();

            if (ticketError) { showToast(ticketError.message, "error"); btn.disabled = false; return; }

            const { error: msgError } = await _supabase.from('ticket_messages').insert([{ ticket_id: newTicket.id, sender_id: currentUser.id, message: document.getElementById('nt_message').value }]);
            if (msgError) showToast("Fehler bei Nachricht", "error"); else showToast("Ticket erstellt!");
            viewTicketChat(newTicket.id);
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
