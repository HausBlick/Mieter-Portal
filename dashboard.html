<!DOCTYPE html>

                extend: {
                    colors: {

                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'

                        'lg': '15px',

    <style>
        body { background-color: #F9FAF8; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        /* Modern Active Link Style */
        .nav-link { border-radius: 15px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; font-weight: 600; box-shadow: 0 4px 10px rgba(104, 116, 81, 0.2); }
        .active-link svg { stroke: white !important; }
        
        input, select, textarea { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); outline: none; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .btn-primary { background-color: #687451; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(104, 116, 81, 0.2); }
        .btn-secondary { background-color: #373737; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-secondary:hover { background-color: #2a2a2a; transform: translateY(-1px); }

        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
    </style>
</head>

            docs: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 stroke-current" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`,

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-hb-orange' : 'bg-hb-olive';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-[15px] shadow-xl flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `<span class="text-sm font-semibold tracking-wide">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                const { data: profile, error: profileError } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                if (profileError || !profile) { document.getElementById('welcome-title').textContent = "Profil nicht gefunden"; return; }
                userProfile = profile;

                document.getElementById('welcome-title').textContent = "Hallo, " + profile.full_name.split(' ')[0] + "!";
                document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';
                document.getElementById('header-name').textContent = profile.full_name;
                document.getElementById('header-avatar').textContent = profile.full_name.charAt(0).toUpperCase();

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            const itemClass = "nav-link flex items-center gap-3 p-3 text-sm font-medium text-gray-600 cursor-pointer";
            const sectionClass = "pt-6 pb-2 px-3 text-[10px] uppercase tracking-widest font-extrabold text-gray-400";
            
            if (role === 'admin') {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    
                    <li class="${sectionClass}">Kommunikation</li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Mieter-Tickets</a></li>
                    
                    <li class="${sectionClass}">Mieterverwaltung</li>
                    <li><a onclick="loadUserManagement(); setActiveNav('nav-users')" id="nav-users" class="${itemClass}">${icons.users} Meine Mieter</a></li>
                    <li><a onclick="loadTenants(); setActiveNav('nav-apartments')" id="nav-apartments" class="${itemClass}">${icons.buildings} Objekte & Einheiten</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Dokumente</a></li>
                `;
            } else {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Meine Tickets</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Meine Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            }
        }

        function setActiveNav(id) {
            if(currentChatInterval) clearInterval(currentChatInterval);
            document.querySelectorAll('#nav-links a, #sidebar button').forEach(el => el.classList.remove('active-link'));
            const activeEl = document.getElementById(id);
            if (activeEl) activeEl.classList.add('active-link');
            if(window.innerWidth < 768) toggleMenu();
        }

        function formatText(text) {
            if (!text) return "";
            let formatted = text
                .replace(/^---$/gm, '<hr class="my-6 border-gray-100">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="text-hb-olive underline font-bold hover:text-hb-orange transition-colors">$1</a>')
                .replace(/\[olive\](.*?)\[\/olive\]/g, '<span class="text-hb-olive font-bold">$1</span>')
                .replace(/\[orange\](.*?)\[\/orange\]/g, '<span class="text-hb-orange font-bold">$1</span>')
                .replace(/^- (.*$)/gim, '<li>$1</li>');
            if (formatted.includes('<li>')) formatted = formatted.replace(/(<li>.*<\/li>)/gms, '<ul>$1</ul>');
            return formatted.split('\n').join('<br>');
        }

        /* --- 0.5. PROFIL EINSTELLUNGEN --- */

        async function fetchNews() {
            let query = _supabase.from('news').select('*, profiles:author_id(full_name), buildings(name)').order('created_at', { ascending: false });
            if (userProfile.role === 'tenant') {
                if(userProfile.apartments && userProfile.apartments.building_id) {
                    query = query.or(`building_id.is.null,building_id.eq.${userProfile.apartments.building_id}`);
                } else { query = query.is('building_id', null); }
            }
            const { data } = await query;
            if (data) { allNews = data; renderNewsFeed(); }
        }

        function renderNewsFeed() {
            const list = document.getElementById('news-list');
            const isAdmin = userProfile.role === 'admin';
            let filtered = allNews.filter(n => {
                const matchesSearch = n.title.toLowerCase().includes(newsSearchQuery.toLowerCase()) || n.content.toLowerCase().includes(newsSearchQuery.toLowerCase());
                const matchesCat = newsCategoryFilter === "" || n.category === newsCategoryFilter;
                return matchesSearch && matchesCat;
            });

            if (filtered.length > 0) {
                list.innerHTML = filtered.map(n => {
                    let likedBy = [];
                    try { likedBy = n.liked_by || []; } catch(e){}
                    const hasLiked = likedBy.includes(currentUser.id);
                    const likeIconColor = hasLiked ? 'text-hb-orange fill-current' : 'text-gray-300';

                    return `
                    <div class="card p-6 md:p-8">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-hb-olive text-white font-bold flex items-center justify-center rounded-full text-sm uppercase">${(n.profiles?.full_name || 'HB').charAt(0)}</div>
                                <div>
                                    <p class="text-sm font-bold text-hb-offblack">${n.profiles?.full_name || 'HB Verwaltung'}</p>
                                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-medium">${new Date(n.created_at).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })}${isAdmin && n.buildings?.name ? ` • ${n.buildings.name}` : ''}</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <span class="px-3 py-1 bg-gray-50 text-gray-600 text-[10px] font-bold uppercase tracking-widest rounded-lg border border-gray-100">${n.category}</span>
                                ${isAdmin ? `<div class="flex gap-3 mt-1"><button onclick="editNews('${n.id}')" class="text-[10px] font-bold text-hb-olive hover:underline">Bearbeiten</button><button onclick="deleteNews('${n.id}')" class="text-[10px] font-bold text-hb-orange hover:underline">Löschen</button></div>` : ''}
                            </div>
                        </div>
                        <div class="mb-6">
                            <h3 class="text-xl font-extrabold text-hb-offblack mb-3">${n.title}</h3>
                            <div class="news-content text-sm text-gray-600 leading-relaxed">${formatText(n.content)}</div>
                        </div>
                        <div class="pt-4 border-t border-gray-50 flex items-center gap-6">
                            <button onclick="handleLike('${n.id}')" class="flex items-center gap-2 transition-all hover:opacity-75" ${hasLiked ? 'title="Bereits geliked"' : ''}>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ${likeIconColor}" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" /></svg>
                                <span class="text-sm font-bold ${hasLiked ? 'text-hb-orange' : 'text-gray-400'}">${n.likes || 0}</span>
                            </button>
                        </div>
                    </div>`
                }).join('');
            } else { list.innerHTML = '<p class="py-12 text-center text-gray-400 italic">Keine Einträge gefunden.</p>'; }
        }

        async function handleSaveNews(e) {
            e.preventDefault();
            const payload = { title: document.getElementById('news_title').value, category: document.getElementById('news_category').value, content: document.getElementById('news_content').value, building_id: document.getElementById('news_b_id').value || null, author_id: currentUser.id };
            if (currentEditingNewsId) await _supabase.from('news').update(payload).eq('id', currentEditingNewsId);
            else await _supabase.from('news').insert([payload]);
            resetNewsForm(); fetchNews(); showToast("Aushang veröffentlicht");
        }

        async function handleLike(id) {
            const newsItem = allNews.find(n => n.id === id);
            if (!newsItem) return;
            
            let likedBy = [];
            try { likedBy = newsItem.liked_by || []; } catch(e){}

            if (likedBy.includes(currentUser.id)) {
                showToast("Du hast diesen Beitrag bereits geliked", "error");
                return;
            }

            likedBy.push(currentUser.id);
            const currentLikes = (newsItem.likes || 0) + 1;

            const { error } = await _supabase.from('news').update({ likes: currentLikes, liked_by: likedBy }).eq('id', id);
            if (error) {
                showToast("Like konnte nicht gespeichert werden.", "error");
            } else {
                fetchNews();
            }
        }

        function handleNewsSearch(val) { newsSearchQuery = val; renderNewsFeed(); }
        function handleNewsFilter(val) { newsCategoryFilter = val; renderNewsFeed(); }

        async function editNews(id) {
            const { data: n } = await _supabase.from('news').select('*').eq('id', id).single();

                document.getElementById('news_content').value = n.content;

        async function handleUpload(e) {
            e.preventDefault();
            const file = document.getElementById('file-input').files[0];
            const btn = document.getElementById('upload-btn');
            if (!file) return showToast("Bitte Datei wählen", "error");
            btn.disabled = true; btn.textContent = "Lade hoch...";
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await _supabase.storage.from('documents').upload(fileName, file);
            if (!uploadError) {
                await _supabase.from('documents').insert([{
                    title: document.getElementById('doc_title').value,
                    category: document.getElementById('doc_category').value,
                    file_path: uploadData.path,
                    tenant_id: document.getElementById('doc_tenant_id').value || null
                }]);
                showToast("Dokument gespeichert!"); loadDocuments();
            } else { showToast(uploadError.message, "error"); btn.disabled = false; }
        }

        async function fetchDocuments() {
            const isAdmin = userProfile.role === 'admin';
            let query = _supabase.from('documents').select('*, profiles:tenant_id (full_name)');
            
            if (!isAdmin) {
                query = query.or(`tenant_id.is.null,tenant_id.eq.${currentUser.id}`);
            }

            const { data } = await query;
            const list = document.getElementById('docs-content');
            if (data && data.length > 0) {
                data.sort((a, b) => {
                    const aReadBy = a.read_by || [];
                    const bReadBy = b.read_by || [];
                    const aUnread = !isAdmin && !aReadBy.includes(currentUser.id);
                    const bUnread = !isAdmin && !bReadBy.includes(currentUser.id);
                    
                    if (aUnread && !bUnread) return -1;
                    if (!aUnread && bUnread) return 1;
                    return new Date(b.created_at) - new Date(a.created_at);
                });

                list.innerHTML = data.map(doc => {
                    const readBy = doc.read_by || [];
                    const isUnread = !isAdmin && !readBy.includes(currentUser.id);
                    const unreadBadge = isUnread ? `<span class="px-2 py-0.5 bg-red-100 text-red-600 rounded text-[10px] font-bold ml-2">NEU</span>` : '';

                    return `
                    <div class="flex items-center justify-between p-4 bg-gray-50 border border-gray-100 rounded-[15px] hover:border-hb-olive transition-colors group">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-white rounded-[15px] text-hb-olive shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-hb-offblack flex items-center">${doc.title} ${unreadBadge}</h4>
                                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mt-0.5">
                                    ${doc.category} • ${new Date(doc.created_at).toLocaleDateString()} 
                                    ${isAdmin && doc.profiles?.full_name ? ` • Für: ${doc.profiles.full_name}` : ''}
                                </p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="downloadAndReadDoc('${doc.id}', '${doc.file_path}', '${JSON.stringify(readBy).replace(/"/g, '&quot;')}')" class="p-2 text-hb-olive hover:bg-hb-olive hover:text-white rounded-[15px] transition-colors tooltip" title="Herunterladen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            </button>
                            ${isAdmin ? `<button onclick="deleteDoc('${doc.id}', '${doc.file_path}')" class="p-2 text-red-400 hover:bg-red-50 rounded-[15px] transition-colors"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>` : ''}
                        </div>
                    </div>`
                }).join('');
            } else { list.innerHTML = '<p class="py-4 text-sm text-gray-400">Keine Dokumente gefunden.</p>'; }
        }

        async function downloadAndReadDoc(id, path, readByStr) {
            let readBy = [];
            try { readBy = JSON.parse(readByStr); } catch(e){}
            
            if(!readBy.includes(currentUser.id) && userProfile.role === 'tenant') {
                readBy.push(currentUser.id);
                _supabase.from('documents').update({read_by: readBy}).eq('id', id).then(() => fetchDocuments());
            }

            const { data, error } = await _supabase.storage.from('documents').download(path);
            if (error) { showToast("Fehler beim Download", "error"); return; }
            
            const url = URL.createObjectURL(data);
            const a = document.createElement('a');
            a.href = url;
            a.download = path.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function deleteDoc(id, path) {
            if (confirm("Wirklich löschen?")) {
                await _supabase.storage.from('documents').remove([path]);
                await _supabase.from('documents').delete().eq('id', id);
                fetchDocuments(); showToast("Dokument gelöscht");
            }
        }

        async function fetchTicketsBoard() {

        async function viewTicketChat(ticketId) {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';

                                ← Zurück
                            </button>
                            <h2 class="text-lg md:text-xl font-bold text-hb-offblack tracking-tight">${ticket.title}</h2>
                        </div>
                        ${isAdmin ? `
                            <select onchange="updateTicketStatus('${ticket.id}', this.value)" class="border-2 border-gray-100 rounded-xl p-2 text-xs font-bold focus:outline-none focus:border-hb-olive bg-gray-50 cursor-pointer">
                                <option value="Neu" ${ticket.status === 'Neu' ? 'selected' : ''}>Status: Neu</option>
                                <option value="In Bearbeitung" ${ticket.status === 'In Bearbeitung' ? 'selected' : ''}>Status: In Bearbeitung</option>
                                <option value="Wartend" ${ticket.status === 'Wartend' ? 'selected' : ''}>Status: Wartend</option>
                                <option value="Erledigt" ${ticket.status === 'Erledigt' ? 'selected' : ''}>Status: Erledigt</option>
                            </select>
                        ` : `<span class="px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-bold rounded-lg border border-gray-200">Status: ${ticket.status}</span>`}
                    </div>

                    <div id="chat-messages" class="flex-grow overflow-y-auto p-6 space-y-6 chat-scroll bg-[#f8f9fa]">

                    </div>

                    <div class="p-4 border-t border-gray-100 bg-white">

                            <div class="flex-grow relative">
                                <textarea id="chat_msg_input" rows="2" class="w-full rounded-[15px] border border-gray-200 p-3 pr-12 focus:outline-none focus:border-hb-olive text-sm resize-none shadow-inner" placeholder="Nachricht schreiben..." required></textarea>
                                <label class="absolute right-3 bottom-3 p-1 cursor-pointer text-gray-400 hover:text-hb-olive transition-colors bg-white rounded-md" title="Datei anhängen">
                                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>

                                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </form>

        async function fetchChatMessages(ticketId, silent = false) {
            const { data, error } = await _supabase.from('ticket_messages').select('*, profiles:sender_id(full_name, role)').eq('ticket_id', ticketId).order('created_at', { ascending: true });
            if (error) return;

            const box = document.getElementById('chat-messages');
            if (data && data.length > 0) {
                const isAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 50;

                box.innerHTML = data.map(msg => {
                    const isMe = msg.sender_id === currentUser.id;
                    const wrapperClass = isMe ? "justify-end" : "justify-start";
                    const bgClass = isMe ? "bg-hb-olive text-white rounded-tr-sm" : "bg-white border border-gray-100 text-gray-800 rounded-tl-sm";
                    const senderName = isMe ? "Ich" : (msg.profiles?.full_name || 'Unbekannt');
                    
                    let attachmentHtml = "";
                    if (msg.attachment_path) {
                        attachmentHtml = `<div class="mt-2 pt-2 border-t ${isMe ? 'border-white/20' : 'border-gray-100'}"><button onclick="viewDoc('${msg.attachment_path}', 'ticket_attachments')" class="text-[10px] font-bold flex items-center gap-1 hover:underline"><svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg> Anhang öffnen</button></div>`;
                    }

                    return `
                    <div class="flex w-full ${wrapperClass}">
                        <div class="max-w-[85%] md:max-w-[70%]">
                            <p class="text-[9px] uppercase tracking-widest text-gray-400 mb-1 font-bold px-1 ${isMe ? 'text-right' : 'text-left'}">
                                ${senderName} • ${new Date(msg.created_at).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}
                            </p>
                            <div class="p-4 shadow-sm rounded-[15px] ${bgClass} text-sm leading-relaxed whitespace-pre-wrap">
                                ${msg.message}
                                ${attachmentHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                if (!silent || isAtBottom) box.scrollTop = box.scrollHeight;
            } else { box.innerHTML = '<div class="text-center py-10 text-gray-400 italic text-sm">Noch keine Nachrichten.</div>'; }
        }

        async function handleSendChatMessage(e, ticketId) {
            e.preventDefault();
            const input = document.getElementById('chat_msg_input');
            const fileInput = document.getElementById('chat_file_input');
            const btn = document.getElementById('chat-send-btn');
            const file = fileInput.files[0];
            const msgText = input.value.trim();
            if (!msgText && !file) return;

            btn.disabled = true; btn.style.opacity = '0.5';
            let attachmentPath = null;

            if (file) {
                const fileName = `${ticketId}/${Date.now()}_${file.name}`;
                const { data, error } = await _supabase.storage.from('ticket_attachments').upload(fileName, file);
                if (error) { showToast("Fehler beim Upload", "error"); btn.disabled = false; btn.style.opacity = '1'; return; }
                attachmentPath = data.path;
            }

            const { error } = await _supabase.from('ticket_messages').insert([{ ticket_id: ticketId, sender_id: currentUser.id, message: msgText, attachment_path: attachmentPath }]);
            if (error) {
                showToast("Fehler beim Senden", "error");
            } else {
                input.value = ''; fileInput.value = ''; document.getElementById('chat-file-name').classList.add('hidden');
                if(userProfile.role === 'admin') _supabase.from('tickets').update({status: 'In Bearbeitung'}).eq('id', ticketId).eq('status', 'Neu').then(()=>{});
                await fetchChatMessages(ticketId);
            }
            btn.disabled = false; btn.style.opacity = '1';
        }

        async function updateTicketStatus(id, newStatus) {
            const { error } = await _supabase.from('tickets').update({ status: newStatus }).eq('id', id);
            if (error) showToast(error.message, "error"); else showToast("Status geändert");
        }

        async function openNewTicketModal() {
            const isAdmin = userProfile.role === 'admin';
            let tenantOptions = '';
            if (isAdmin) {
                const { data: tenants } = await _supabase.from('profiles').select('id, full_name, apartments!apartment_id(apartment_number)').eq('role', 'tenant');
                tenantOptions = tenants?.map(t => `<option value="${t.id}">${t.full_name} (${t.apartments?.apartment_number || 'Keine WE'})</option>`).join('') || '';
            }

            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="card p-8 md:p-12">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-xl font-bold uppercase tracking-widest text-hb-offblack">${isAdmin ? 'Ticket an Mieter senden' : 'Neue Meldung'}</h2>
                        <button onclick="loadTickets()" class="text-[10px] uppercase font-bold text-gray-400 hover:text-hb-orange">Abbrechen</button>
                    </div>
                    <form id="new-ticket-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${isAdmin ? `<div><label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest mb-1">Empfänger (Mieter)</label><select id="nt_tenant_id" class="w-full p-3 text-sm" required><option value="" disabled selected>Bitte wählen...</option>${tenantOptions}</select></div>` : ''}
                            <div class="${isAdmin ? '' : 'col-span-2 md:col-span-1'}">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest mb-1">Kategorie</label>
                                <select id="nt_category" class="w-full p-3 text-sm" required>
                                    <option value="Reparatur">Reparatur / Mangel</option><option value="Allgemein">Allgemeine Anfrage</option><option value="Termin">Termin</option>
                                    ${isAdmin ? '<option value="Mahnung">Verwarnung</option>' : '<option value="Beschwerde">Beschwerde</option>'}
                                </select>
                            </div>
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest mb-1">Betreff</label>
                                <input type="text" id="nt_title" class="w-full p-3 text-sm" placeholder="Zusammenfassung..." required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest mb-1">Nachricht</label>
                            <textarea id="nt_message" rows="5" class="w-full p-4 text-sm" placeholder="Beschreiben Sie das Anliegen..." required></textarea>
                        </div>
                        <div class="pt-4 flex justify-end">
                            <button type="submit" id="nt-submit-btn" class="btn-primary px-8 py-3 text-sm">Ticket Eröffnen</button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('new-ticket-form').addEventListener('submit', createNewTicketProcess);
        }

        async function createNewTicketProcess(e) {
            e.preventDefault();
            const btn = document.getElementById('nt-submit-btn');
            btn.disabled = true; btn.textContent = "Erstelle...";
            const isAdmin = userProfile.role === 'admin';
            const targetTenantId = isAdmin ? document.getElementById('nt_tenant_id').value : currentUser.id;
            
            const { data: newTicket, error: ticketError } = await _supabase.from('tickets').insert([{
                title: document.getElementById('nt_title').value, category: document.getElementById('nt_category').value, tenant_id: targetTenantId, creator_id: currentUser.id, description: document.getElementById('nt_message').value, status: 'Neu'
            }]).select('id').single();

            if (ticketError) { showToast(ticketError.message, "error"); btn.disabled = false; return; }

            const { error: msgError } = await _supabase.from('ticket_messages').insert([{ ticket_id: newTicket.id, sender_id: currentUser.id, message: document.getElementById('nt_message').value }]);
            if (msgError) showToast("Fehler bei Nachricht", "error"); else showToast("Ticket erstellt!");
            viewTicketChat(newTicket.id);
        }


        /* --- 5. KONTAKTBUCH (PLATZHALTER) --- */
        async function loadContacts() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            
            container.innerHTML = `
                <div class="card p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-extrabold text-hb-offblack flex items-center gap-2">${icons.contact} Kontaktbuch</h2>
                        ${isAdmin ? `<button class="btn-primary px-4 py-2 text-xs shadow-md">+ Kontakt anlegen</button>` : ''}
                    </div>
                    <p class="text-sm text-gray-500 mb-6">Wichtige Ansprechpartner für Ihre Wohnanlage.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="contacts-list">
                        <div class="border border-gray-100 p-4 rounded-[15px] flex items-start gap-4">
                            <div class="p-3 bg-hb-ultralight rounded-xl text-hb-olive"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                            <div>
                                <h4 class="font-bold text-hb-offblack">Hausmeister Service</h4>
                                <p class="text-xs text-gray-500 mt-1">Erreichbar Mo-Fr 08:00 - 16:00</p>
                                <a href="tel:0123456789" class="text-xs font-bold text-hb-olive mt-2 inline-block">0123 / 456 789</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
