<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 
                        'lg': '15px',
                        'xl': '15px', 
                        '2xl': '15px', 
                        '3xl': '15px' 
                    },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        /* Modern Active Link Style */
        .nav-link { border-radius: 15px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; font-weight: 600; box-shadow: 0 4px 10px rgba(104, 116, 81, 0.2); }
        .active-link svg { stroke: white !important; }
        
        input, select, textarea { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 12px 16px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); outline: none; }
        input[type="checkbox"] { border-radius: 4px; width: 1.2rem; height: 1.2rem; accent-color: #EB762D; cursor: pointer; padding: 0; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .btn-primary { background-color: #687451; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(104, 116, 81, 0.2); }
        .btn-secondary { background-color: #373737; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-secondary:hover { background-color: #2a2a2a; transform: translateY(-1px); }

        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
        
        .message-appear { animation: fadeInScale 0.2s ease-out forwards; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-hb-orange' : 'bg-hb-olive';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-[15px] shadow-xl flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `<span class="text-base font-semibold tracking-wide">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                // 1. Zuerst NUR das Profil laden (verhindert Abstürze durch Join-Fehler)
                const { data: profile, error: profileError } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                
                if (profileError || !profile) { 
                    console.error("Profil Fehler:", profileError);
                    document.getElementById('welcome-title').textContent = profileError ? `Fehler: ${profileError.message}` : "Profil nicht in der Datenbank."; 
                    document.getElementById('role-label').textContent = "SYSTEMFEHLER";
                    return; 
                }
                userProfile = profile;

                // 2. Wohnung separat laden, falls Mieter
                if (userProfile.role === 'tenant' && userProfile.apartment_id) {
                    const { data: aptData } = await _supabase.from('apartments').select('building_id').eq('id', userProfile.apartment_id).single();
                    if (aptData) {
                        userProfile.apartments = { building_id: aptData.building_id };
                    }
                }

                document.getElementById('welcome-title').textContent = "Hallo, " + (profile.full_name ? profile.full_name.split(' ')[0] : 'Nutzer') + "!";
                document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

            const sectionClass = "pt-6 pb-2 px-3 text-xs uppercase tracking-widest font-extrabold text-gray-400";
            
            if (role === 'admin') {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li class="${sectionClass}">Kommunikation</li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Mieter-Tickets</a></li>
                    <li class="${sectionClass}">Mieterverwaltung</li>
                    <li><a onclick="loadUserManagement(); setActiveNav('nav-users')" id="nav-users" class="${itemClass}">${icons.users} Meine Mieter</a></li>
                    <li><a onclick="loadTenants(); setActiveNav('nav-apartments')" id="nav-apartments" class="${itemClass}">${icons.buildings} Objekte & Einheiten</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Dokumente</a></li>
                    <li class="${sectionClass}">Service</li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            } else {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Meine Tickets</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Meine Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            }
        }

        function setActiveNav(id) {
            if(currentChatInterval) clearInterval(currentChatInterval);
            document.querySelectorAll('#nav-links a, #sidebar button').forEach(el => el.classList.remove('active-link'));
            const activeEl = document.getElementById(id);
            if (activeEl) activeEl.classList.add('active-link');
            if(window.innerWidth < 768) toggleMenu();
        }

        function formatText(text) {
            if (!text) return "";
            let formatted = text
                .replace(/^---$/gm, '<hr class="my-6 border-gray-100">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="text-hb-olive underline font-bold hover:text-hb-orange transition-colors">$1</a>')
                .replace(/\[olive\](.*?)\[\/olive\]/g, '<span class="text-hb-olive font-bold">$1</span>')
                .replace(/\[orange\](.*?)\[\/orange\]/g, '<span class="text-hb-orange font-bold">$1</span>')
                .replace(/^- (.*$)/gim, '<li>$1</li>');
            if (formatted.includes('<li>')) formatted = formatted.replace(/(<li>.*<\/li>)/gms, '<ul class="list-disc pl-5 space-y-1">$1</ul>');
            return formatted.split('\n').join('<br>');
        }

        async function viewDoc(path, bucket = 'documents') {
            const { data, error } = await _supabase.storage.from(bucket).createSignedUrl(path, 3600); 
            if (error) { 
                showToast("Fehler beim Öffnen des Dokuments", "error"); 
                return; 
            }
            window.open(data.signedUrl, '_blank');
        }

        async function loadProfile() {
            const container = document.getElementById('content-area');
            
            container.innerHTML = `
                <div class="card p-8 md:p-12 mb-8">
                    <h2 class="text-2xl font-bold mb-8 uppercase tracking-widest text-hb-offblack">Mein Profil</h2>

                            <div class="col-span-1 md:col-span-2">

        async function handleUpdateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-update-profile');
            btn.disabled = true; btn.textContent = "Speichere...";
            
            const newName = document.getElementById('profile_name').value;
            const newBirthday = document.getElementById('profile_birthday').value || null;
            const newPhone = document.getElementById('profile_phone').value || null;
            const newMobile = document.getElementById('profile_mobile').value || null;
            
            const payload = { 
                full_name: newName,
                birthday: newBirthday,
                phone: newPhone,
                mobile: newMobile
            };

            const { error } = await _supabase.from('profiles').update(payload).eq('id', currentUser.id);
            if(error) {
                showToast(error.message, "error");
            } else {
                userProfile.full_name = newName;
                userProfile.birthday = newBirthday;
                userProfile.phone = newPhone;
                userProfile.mobile = newMobile;
                document.getElementById('welcome-title').textContent = "Hallo, " + newName.split(' ')[0] + "!";
                showToast("Profil aktualisiert!");
            }
            btn.disabled = false; btn.textContent = "Daten Speichern";
        }

        async function handleUpdatePassword(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-update-password');
            btn.disabled = true; btn.textContent = "Speichere...";
            const newPassword = document.getElementById('new_password').value;

            const { error } = await _supabase.auth.updateUser({ password: newPassword });
            if(error) {
                showToast("Fehler: " + error.message, "error");
            } else {
                showToast("Passwort erfolgreich geändert!");
                document.getElementById('new_password').value = '';
            }
            btn.disabled = false; btn.textContent = "Passwort aktualisieren";
        }

            };

            resetForm(); fetchApartments(); showToast("Einheit gespeichert");
        }

        async function editApartment(id) {
            const { data: apt } = await _supabase.from('apartments').select('*').eq('id', id).single();
            if (apt) {
                currentEditingId = id;
                document.getElementById('b_id').value = apt.building_id;
                document.getElementById('apt_no').value = apt.apartment_number;
                document.getElementById('rent').value = apt.rent_amount;
                document.getElementById('utils').value = apt.utilities_amount;
                document.getElementById('sq_m').value = apt.sq_meters;
                if(document.getElementById('m_elec')) document.getElementById('m_elec').value = apt.meter_electricity || '';
                if(document.getElementById('m_water')) document.getElementById('m_water').value = apt.meter_water || '';
                if(document.getElementById('m_heat')) document.getElementById('m_heat').value = apt.meter_heating || '';
                document.getElementById('form-title').textContent = "Einheit bearbeiten";
                document.getElementById('submit-btn').textContent = "Änderungen speichern";
                document.getElementById('cancel-btn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });

        async function handleCreateInvite(e) {
            e.preventDefault();
            const btn = document.getElementById('create-invite-btn');
            btn.disabled = true; btn.textContent = "Generiere Code...";

            const aptId = document.getElementById('tenant_apt_id').value;
            const fullName = document.getElementById('tenant_name').value.trim();
            const email = document.getElementById('tenant_email').value.trim();
            
            const code = 'HB-' + Math.random().toString(36).substring(2, 8).toUpperCase();

            const payload = {
                code: code, 
                full_name: fullName,
                email: email,
                apartment_id: aptId
            };

            const { error } = await _supabase.from('invitations').insert([payload]);
            
            if (error) {
                showToast(error.message, "error");
                btn.disabled = false; btn.textContent = "Einladung generieren";
            } else {
                showToast("Einladung erfolgreich vorbereitet!");
                document.getElementById('tenant-invite-form').reset();
                fetchTenantUsers();
            }
        }

        async function fetchTenantUsers() {
            const inviteList = document.getElementById('invites-list');
            const userList = document.getElementById('user-list');

            const { data: invites, error: inviteError } = await _supabase
                .from('invitations')
                .select('*, apartments(apartment_number, buildings(name))')
                .order('created_at', { ascending: false });
            
            if (inviteError) {
                inviteList.innerHTML = `<p class="text-red-500 py-4 italic">Fehler beim Laden: ${inviteError.message}</p>`;
            } else if (invites && invites.length > 0) {
                inviteList.innerHTML = invites.map(i => `
                    <div class="py-5 flex justify-between items-center group bg-yellow-50/50 px-5 rounded-xl mb-3 border border-yellow-100">
                        <div>
                            <p class="font-bold text-hb-offblack text-base">${i.full_name} <span class="bg-yellow-200 text-yellow-800 text-[10px] px-2 py-1 rounded ml-2 uppercase tracking-widest font-bold">Wartet auf Login</span></p>
                            <p class="text-sm text-gray-500 font-medium mt-1">
                                ${i.email} • Code: <strong class="font-mono text-hb-olive">${i.code}</strong> • ${i.apartments?.buildings?.name || ''} ${i.apartments?.apartment_number || ''}
                            </p>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="sendInviteEmail('${i.email}', '${i.code}')" class="text-xs font-bold text-hb-olive hover:underline border border-hb-olive px-4 py-2 rounded-lg hover:bg-hb-olive hover:text-white transition-colors">Link via E-Mail senden</button>
                            <button onclick="deleteInvite('${i.code}')" class="text-xs font-bold text-red-500 opacity-0 group-hover:opacity-100 transition-opacity hover:underline">Löschen</button>
                        </div>
                    </div>`).join('');
            } else { inviteList.innerHTML = '<p class="py-4 text-gray-400 italic text-base">Keine ausstehenden Einladungen.</p>'; }

            const { data: users, error: usersError } = await _supabase
                .from('profiles')
                .select('*, apartments(apartment_number, buildings(name))')
                .eq('role', 'tenant')
                .order('full_name');
            
            if (usersError) {
                userList.innerHTML = `<p class="text-red-500 py-4 italic">Fehler beim Laden: ${usersError.message}</p>`;
            } else if (users && users.length > 0) {
                userList.innerHTML = users.map(u => `

                        <div>
                            <p class="font-bold text-hb-offblack text-base">${u.full_name} <span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded ml-2 uppercase tracking-widest font-bold">Aktiv</span></p>
                            <p class="text-sm text-gray-500 font-medium mt-1">

                            <button onclick="deleteProfile('${u.id}')" class="text-xs font-bold text-red-500 opacity-0 group-hover:opacity-100 transition-opacity hover:underline">Account entfernen</button>
                        </div>
                    </div>`).join('');
            } else { userList.innerHTML = '<p class="py-6 text-gray-400 italic text-base">Keine aktiven Mieter-Accounts.</p>'; }
        }

        function sendInviteEmail(email, code) {
            const baseUrl = window.location.href.split('/').slice(0, -1).join('/');
            const registerUrl = baseUrl + '/register.html';
            
            const subject = encodeURIComponent("Ihre Einladung zum Mieterportal");
            const body = encodeURIComponent(`Hallo,\n\nhier ist Ihre Einladung zum neuen digitalen Mieterportal.\nIm Portal haben Sie ab jetzt Zugriff auf Ihre Dokumente zum Mietverhältnis, können mit uns Kommunizieren und erhalten aktuelle News und informationen.\n\nBitte klicken Sie auf den folgenden Link und geben Sie Ihr gewünschtes Passwort ein, um Ihren Account zu aktivieren:\n\nPortal-Link: ${registerUrl}?code=${code}\n\nIhr persönlicher Einladungscode lautet: ${code}\n\nViele Grüße\n\nHB Verwaltung`);
            
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

                await _supabase.from('profiles').delete().eq('id', id);

                showToast("Mieter entfernt");
            }
        }

                            <option value="">Alle</option><option value="Information">Info</option><option value="Ankündigung">Ankündigung</option><option value="Wartung">Wartung</option>
                        </select>
                    </div>
                </div>
                <div id="news-list" class="space-y-8"></div>`;

            container.innerHTML = html;
            if (isAdmin) document.getElementById('news-form').addEventListener('submit', handleSaveNews);
            fetchNews();
        }

        async function fetchNews() {
            let query = _supabase.from('news').select('*, profiles:author_id(full_name), buildings(name)').order('created_at', { ascending: false });
            if (userProfile.role === 'tenant') {
                if(userProfile.apartments && userProfile.apartments.building_id) {
                    query = query.or(`building_id.is.null,building_id.eq.${userProfile.apartments.building_id}`);
                } else { query = query.is('building_id', null); }
            }
            const { data } = await query;
            if (data) { allNews = data; renderNewsFeed(); }
        }

        function renderNewsFeed() {
            const list = document.getElementById('news-list');
            const isAdmin = userProfile.role === 'admin';
            let filtered = allNews.filter(n => {
                const matchesSearch = n.title.toLowerCase().includes(newsSearchQuery.toLowerCase()) || n.content.toLowerCase().includes(newsSearchQuery.toLowerCase());
                const matchesCat = newsCategoryFilter === "" || n.category === newsCategoryFilter;
                return matchesSearch && matchesCat;
            });

            if (filtered.length > 0) {
                list.innerHTML = filtered.map(n => {
                    let likedBy = [];
                    try { likedBy = n.liked_by || []; } catch(e){}
                    const hasLiked = likedBy.includes(currentUser.id);
                    const likeIconColor = hasLiked ? 'text-hb-orange fill-current' : 'text-gray-300';

                    return `
                    <div class="card p-8 md:p-10">
                        <div class="flex justify-between items-start mb-8">
                            <div class="flex items-center gap-5">
                                <div class="w-12 h-12 bg-hb-olive text-white font-bold flex items-center justify-center rounded-full text-base uppercase">${(n.profiles?.full_name || 'HB').charAt(0)}</div>
                                <div>
                                    <p class="text-base font-bold text-hb-offblack">${n.profiles?.full_name || 'HB Verwaltung'}</p>
                                    <p class="text-xs text-gray-400 uppercase tracking-widest font-medium mt-1">${new Date(n.created_at).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })}${isAdmin && n.buildings?.name ? ` • ${n.buildings.name}` : ''}</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-3">
                                <span class="px-4 py-1.5 bg-gray-50 text-gray-600 text-xs font-bold uppercase tracking-widest rounded-lg border border-gray-100">${n.category}</span>
                                ${isAdmin ? `<div class="flex gap-4 mt-2"><button onclick="editNews('${n.id}')" class="text-xs font-bold text-hb-olive hover:underline">Bearbeiten</button><button onclick="deleteNews('${n.id}')" class="text-xs font-bold text-hb-orange hover:underline">Löschen</button></div>` : ''}
                            </div>
                        </div>
                        <div class="mb-8">
                            <h3 class="text-2xl font-extrabold text-hb-offblack mb-4">${n.title}</h3>
                            <div class="news-content text-base text-gray-600 leading-relaxed">${formatText(n.content)}</div>
                        </div>
                        <div class="pt-5 border-t border-gray-50 flex items-center gap-6">
                            <button onclick="handleLike('${n.id}')" class="flex items-center gap-3 transition-all hover:opacity-75" ${hasLiked ? 'title="Bereits geliked"' : ''}>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 ${likeIconColor}" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" /></svg>
                                <span class="text-base font-bold ${hasLiked ? 'text-hb-orange' : 'text-gray-400'}">${n.likes || 0}</span>
                            </button>
                        </div>
                    </div>`
                }).join('');
            } else { list.innerHTML = '<p class="py-16 text-center text-gray-400 italic text-lg">Keine Einträge gefunden.</p>'; }
        }

        async function handleSaveNews(e) {
            e.preventDefault();
            const payload = { title: document.getElementById('news_title').value, category: document.getElementById('news_category').value, content: document.getElementById('news_content').value, building_id: document.getElementById('news_b_id').value || null, author_id: currentUser.id };
            if (currentEditingNewsId) await _supabase.from('news').update(payload).eq('id', currentEditingNewsId);
            else await _supabase.from('news').insert([payload]);
            resetNewsForm(); fetchNews(); showToast("Aushang veröffentlicht");
        }

        async function handleLike(id) {
            const newsItem = allNews.find(n => n.id === id);
            if (!newsItem) return;
            
            let likedBy = [];
            try { likedBy = newsItem.liked_by || []; } catch(e){}

            if (likedBy.includes(currentUser.id)) {
                showToast("Du hast diesen Beitrag bereits geliked", "error");
                return;
            }

            likedBy.push(currentUser.id);
            const currentLikes = (newsItem.likes || 0) + 1;

            const { error } = await _supabase.from('news').update({ likes: currentLikes, liked_by: likedBy }).eq('id', id);
            if (error) {
                showToast("Like konnte nicht gespeichert werden.", "error");
            } else {
                fetchNews();
            }
        }

        function handleNewsSearch(val) { newsSearchQuery = val; renderNewsFeed(); }
        function handleNewsFilter(val) { newsCategoryFilter = val; renderNewsFeed(); }

        async function editNews(id) {
            const { data: n } = await _supabase.from('news').select('*').eq('id', id).single();
            if (n) {
                currentEditingNewsId = id;
                document.getElementById('news_title').value = n.title;
                document.getElementById('news_category').value = n.category;
                document.getElementById('news_content').value = n.content;
                document.getElementById('news_b_id').value = n.building_id || '';
                document.getElementById('news-form-title').innerHTML = `${icons.news} Aushang bearbeiten`;
                document.getElementById('news-submit-btn').textContent = "Speichern";
                document.getElementById('news-cancel-btn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetNewsForm() {
            currentEditingNewsId = null;
            document.getElementById('news-form').reset();
            document.getElementById('news-form-title').innerHTML = `${icons.news} Neuer Aushang`;
            document.getElementById('news-submit-btn').textContent = "Veröffentlichen";
            document.getElementById('news-cancel-btn').classList.add('hidden');
        }

        async function deleteNews(id) { if (confirm("Löschen?")) { await _supabase.from('news').delete().eq('id', id); fetchNews(); showToast("Gelöscht"); } }


        /* --- 3. DOKUMENTE --- */
        async function loadDocuments() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            let tenantOptions = '';
            
            if (isAdmin) {
                const { data: tenants } = await _supabase.from('profiles').select('id, full_name').eq('role', 'tenant').order('full_name');
                tenantOptions = tenants?.map(t => `<option value="${t.id}">${t.full_name}</option>`).join('') || '';
            }

            let html = "";
            if (isAdmin) {
                html += `
                    <div class="card p-8 md:p-12 mb-8">
                        <h2 class="text-2xl font-bold mb-8 text-hb-offblack flex items-center gap-3">${icons.docs} Dokument hochladen</h2>
                        <form id="upload-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1">Kategorie</label>
                                    <select id="doc_category" class="w-full p-4 text-base">
                                        <option value="Abrechnung">Jahresabrechnung</option><option value="Mietvertrag">Mietvertrag</option><option value="Protokoll">Protokoll</option><option value="Sonstiges">Sonstiges</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1">Titel</label>
                                    <input type="text" id="doc_title" class="w-full p-4 text-base" placeholder="Anzeigetitel" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1">Sichtbarkeit</label>
                                    <select id="doc_tenant_id" class="w-full p-4 text-base">
                                        <option value="">Allgemeines Dokument (Für alle sichtbar)</option>
                                        ${tenantOptions}
                                    </select>
                                </div>
                                <div class="flex items-end">
                                    <label class="flex items-center justify-center w-full h-[56px] border-2 border-dashed border-gray-300 rounded-[15px] cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                                        <span class="text-sm font-bold text-gray-500" id="file-status">PDF / Datei auswählen</span>
                                        <input id="file-input" type="file" class="hidden" onchange="document.getElementById('file-status').textContent = this.files[0].name" />
                                    </label>
                                </div>
                            </div>
                            <button type="submit" id="upload-btn" class="btn-primary px-10 py-4 text-base w-full md:w-auto mt-4">Upload starten</button>
                        </form>
                    </div>
                `;
            }

            html += `
                <div class="card p-8 md:p-12">
                    <h2 class="text-2xl font-extrabold text-hb-offblack mb-8">${isAdmin ? 'Alle Dokumente' : 'Meine Dokumente'}</h2>
                    <div id="docs-content" class="space-y-4">Lade...</div>
                </div>
            `;
            container.innerHTML = html;
            if (isAdmin) document.getElementById('upload-form').addEventListener('submit', handleUpload);
            fetchDocuments();
        }

        async function handleUpload(e) {
            e.preventDefault();
            const file = document.getElementById('file-input').files[0];
            const btn = document.getElementById('upload-btn');
            if (!file) return showToast("Bitte Datei wählen", "error");
            btn.disabled = true; btn.textContent = "Lade hoch...";
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await _supabase.storage.from('documents').upload(fileName, file);
            if (!uploadError) {
                await _supabase.from('documents').insert([{
                    title: document.getElementById('doc_title').value,
                    category: document.getElementById('doc_category').value,
                    file_path: uploadData.path,
                    tenant_id: document.getElementById('doc_tenant_id').value || null
                }]);
                showToast("Dokument gespeichert!"); loadDocuments();
            } else { showToast(uploadError.message, "error"); btn.disabled = false; }
        }

        async function fetchDocuments() {
            const isAdmin = userProfile.role === 'admin';
            let query = _supabase.from('documents').select('*, profiles:tenant_id (full_name)');
            
            if (!isAdmin) {
                query = query.or(`tenant_id.is.null,tenant_id.eq.${currentUser.id}`);
            }

            const { data } = await query;
            const list = document.getElementById('docs-content');
            if (data && data.length > 0) {
                data.sort((a, b) => {
                    const aReadBy = a.read_by || [];
                    const bReadBy = b.read_by || [];
                    const aUnread = !isAdmin && !aReadBy.includes(currentUser.id);
                    const bUnread = !isAdmin && !bReadBy.includes(currentUser.id);
                    
                    if (aUnread && !bUnread) return -1;
                    if (!aUnread && bUnread) return 1;
                    return new Date(b.created_at) - new Date(a.created_at);
                });

                list.innerHTML = data.map(doc => {
                    const readBy = doc.read_by || [];
                    const isUnread = !isAdmin && !readBy.includes(currentUser.id);
                    const unreadBadge = isUnread ? `<span class="px-3 py-1 bg-red-100 text-red-600 rounded text-[10px] font-bold ml-3">NEU</span>` : '';

                    return `
                    <div class="flex items-center justify-between p-5 bg-gray-50 border border-gray-100 rounded-[15px] hover:border-hb-olive transition-colors group">
                        <div class="flex items-center gap-5">
                            <div class="p-4 bg-white rounded-[15px] text-hb-olive shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-base text-hb-offblack flex items-center">${doc.title} ${unreadBadge}</h4>
                                <p class="text-xs text-gray-500 uppercase tracking-widest font-bold mt-1">
                                    ${doc.category} • ${new Date(doc.created_at).toLocaleDateString()} 
                                    ${isAdmin && doc.profiles?.full_name ? ` • Für: ${doc.profiles.full_name}` : ''}
                                </p>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="viewDoc('${doc.file_path}', 'documents')" class="p-3 text-hb-olive hover:bg-hb-olive hover:text-white rounded-[15px] transition-colors tooltip" title="Dokument anzeigen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                            </button>
                            ${isAdmin ? `<button onclick="deleteDoc('${doc.id}', '${doc.file_path}')" class="p-3 text-red-400 hover:bg-red-50 rounded-[15px] transition-colors"><svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>` : ''}
                        </div>
                    </div>`
                }).join('');
            } else { list.innerHTML = '<p class="py-6 text-base text-gray-400">Keine Dokumente gefunden.</p>'; }
        }

        async function deleteDoc(id, path) {
            if (confirm("Wirklich löschen?")) {
                await _supabase.storage.from('documents').remove([path]);
                await _supabase.from('documents').delete().eq('id', id);
                fetchDocuments(); showToast("Dokument gelöscht");
            }
        }

                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="card p-8 md:p-12">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-2xl font-extrabold text-hb-offblack flex items-center gap-3">${icons.tickets} Meine Meldungen</h2>
                            <button onclick="openNewTicketModal()" class="btn-primary px-8 py-3 text-base shadow-md">+ Meldung erstellen</button>
                        </div>
                        <div id="tenant-ticket-list" class="space-y-6">Lade...</div>
                        
                        <div class="mt-12 border-t border-gray-100 pt-10">
                            <button onclick="toggleCompletedTickets()" class="text-base font-extrabold text-gray-500 hover:text-hb-olive flex items-center gap-3 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7" /></svg>
                                Erledigte Tickets einblenden
                            </button>
                            <div id="completed-tickets-list" class="hidden mt-8 space-y-6"></div>
                        </div>
                    </div>
                `;

            fetchTicketsBoard();

        async function fetchTicketsBoard() {
            const isAdmin = userProfile.role === 'admin';
            let query = _supabase.from('tickets').select('*, profiles!tenant_id(full_name)').neq('status', 'Erledigt').order('created_at', { ascending: false });
            if (!isAdmin) query = query.eq('tenant_id', currentUser.id);

            const { data, error } = await query;
            if (error) return showToast(error.message, "error");

            if (isAdmin) {
                const nT = data.filter(t => t.status === 'Neu' || t.status === 'Offen');
                const pT = data.filter(t => t.status === 'In Bearbeitung');
                const hT = data.filter(t => t.status === 'Wartend');

                document.getElementById('count-new').textContent = nT.length;
                document.getElementById('count-progress').textContent = pT.length;
                document.getElementById('count-hold').textContent = hT.length;

                document.getElementById('board-new').innerHTML = nT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-sm text-gray-400 font-bold">Leer</div>';
                document.getElementById('board-progress').innerHTML = pT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-sm text-gray-400 font-bold">Leer</div>';
                document.getElementById('board-hold').innerHTML = hT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-sm text-gray-400 font-bold">Leer</div>';
            } else {
                const list = document.getElementById('tenant-ticket-list');
                list.innerHTML = data.map(t => generateTicketCard(t)).join('') || '<p class="text-base italic text-gray-400">Keine aktiven Meldungen.</p>';
            }
        }

        async function toggleCompletedTickets() {
            showingCompletedTickets = !showingCompletedTickets;
            const container = document.getElementById('completed-tickets-list');
            
            if(showingCompletedTickets) {
                container.classList.remove('hidden');
                container.innerHTML = '<p class="text-sm text-gray-400 italic">Lade...</p>';
                
                const isAdmin = userProfile.role === 'admin';
                let query = _supabase.from('tickets').select('*, profiles!tenant_id(full_name)').eq('status', 'Erledigt').order('created_at', { ascending: false });
                if (!isAdmin) query = query.eq('tenant_id', currentUser.id);

                const { data, error } = await query;
                if (error) { container.innerHTML = '<p class="text-red-500">Fehler beim Laden.</p>'; return; }

                if (data && data.length > 0) {
                    container.innerHTML = data.map(t => generateTicketCard(t, true)).join('');
                } else {
                    container.innerHTML = '<p class="text-base text-gray-400 italic">Keine erledigten Tickets vorhanden.</p>';
                }
            } else {
                container.classList.add('hidden');
            }
        }

        function generateTicketCard(t, isCompleted = false) {
            const isNew = t.status === 'Neu' || t.status === 'Offen';
            let borderCol = isNew ? 'border-red-200 hover:border-red-400' : (t.status === 'In Bearbeitung' ? 'border-orange-200 hover:border-hb-orange' : 'border-gray-200 hover:border-gray-400');
            
            if(isCompleted) borderCol = 'border-gray-200 bg-gray-50 opacity-75 hover:opacity-100 hover:border-gray-400';

            return `
                <div onclick="viewTicketChat('${t.id}')" class="bg-white p-6 rounded-[15px] shadow-sm border-2 ${borderCol} cursor-pointer transition-all transform hover:-translate-y-1">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs uppercase tracking-widest font-extrabold bg-gray-100 px-3 py-1.5 rounded text-gray-600">${t.category}</span>
                        <span class="text-xs font-bold text-gray-400">${new Date(t.created_at).toLocaleDateString()}</span>
                    </div>
                    <h4 class="text-base font-extrabold text-hb-offblack leading-tight mb-4">${t.title}</h4>
                    <p class="text-xs text-gray-500 font-bold mt-4 pt-4 border-t border-gray-50 flex items-center gap-2">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        ${t.profiles?.full_name || 'Unbekannt'}
                    </p>
                </div>
            `;
        }

        async function viewTicketChat(ticketId) {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            const { data: ticket } = await _supabase.from('tickets').select('*, profiles!tenant_id(full_name)').eq('id', ticketId).single();
            if(!ticket) return;

            container.innerHTML = `
                <div class="card flex flex-col h-[calc(100vh-160px)] overflow-hidden shadow-2xl">
                    <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-white z-10 shadow-sm">
                        <div>
                            <button onclick="loadTickets(); if(currentChatInterval) clearInterval(currentChatInterval);" class="text-xs uppercase tracking-widest font-extrabold text-hb-olive hover:text-hb-offblack mb-3 flex items-center gap-2 transition-colors">

            document.getElementById('chat_file_input').addEventListener('change', function() {

                    nameDisplay.querySelector('span').textContent = this.files[0].name;

            });

            document.getElementById('chat-reply-form').addEventListener('submit', (e) => handleSendChatMessage(e, ticketId));

            if(currentChatInterval) clearInterval(currentChatInterval);
            currentChatInterval = setInterval(() => fetchChatMessages(ticketId, true), 10000);

        async function fetchChatMessages(ticketId, silent = false) {
            const { data, error } = await _supabase.from('ticket_messages').select('*, profiles!sender_id(full_name, role)').eq('ticket_id', ticketId).order('created_at', { ascending: true });
            if (error) return;

            const box = document.getElementById('chat-messages');
            if (data && data.length > 0) {
                const isAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;

                box.innerHTML = data.map(msg => {
                    const isMe = msg.sender_id === currentUser.id;
                    const wrapperClass = isMe ? "justify-end" : "justify-start";
                    const alignClass = isMe ? "items-end" : "items-start";
                    
                    // Design der Blasen
                    const bgClass = isMe 
                        ? "bg-hb-olive text-white rounded-[20px] rounded-br-[4px] shadow-sm" 
                        : "bg-white text-hb-offblack border border-gray-100 rounded-[20px] rounded-bl-[4px] shadow-sm";
                    
                    const senderName = isMe ? "Ich" : (msg.profiles?.full_name || 'System');
                    
                    let attachmentHtml = "";
                    if (msg.attachment_path) {
                        const btnClass = isMe 
                            ? "text-white hover:bg-white/10" 
                            : "text-hb-olive hover:bg-hb-olive/5";
                            
                        attachmentHtml = `
                        <div class="mt-3 pt-3 border-t ${isMe ? 'border-white/20' : 'border-gray-100'}">
                            <button type="button" onclick="viewDoc('${msg.attachment_path}', 'ticket_attachments')" class="text-xs font-bold flex items-center gap-2 px-3 py-2 -ml-3 rounded-lg transition-colors ${btnClass}">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> 
                                Anhang ansehen
                            </button>
                        </div>`;
                    }

                    return `
                    <div class="flex w-full ${wrapperClass} mb-4 message-appear">
                        <div class="flex flex-col ${alignClass} max-w-[85%] md:max-w-[65%]">
                            <div class="flex items-center gap-2 mb-1 px-1">
                                <span class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">${senderName}</span>
                                <span class="text-[10px] text-gray-400 font-medium">${new Date(msg.created_at).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="px-5 py-3 text-[15px] leading-relaxed whitespace-pre-wrap break-words text-left inline-block ${bgClass}" style="width: fit-content;">
                                ${msg.message}
                                ${attachmentHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                if (!silent || isAtBottom) box.scrollTop = box.scrollHeight;
            } else { box.innerHTML = '<div class="text-center py-20 text-gray-400 italic text-base">Noch keine Nachrichten vorhanden.</div>'; }
        }

        async function handleSendChatMessage(e, ticketId) {
            e.preventDefault();
            const input = document.getElementById('chat_msg_input');
            const fileInput = document.getElementById('chat_file_input');
            const btn = document.getElementById('chat-send-btn');
            const file = fileInput.files[0];
            const msgText = input.value.trim();
            if (!msgText && !file) return;

            btn.disabled = true; btn.style.opacity = '0.5';
            let attachmentPath = null;

            if (file) {
                const fileName = `${ticketId}/${Date.now()}_${file.name}`;
                const { data, error } = await _supabase.storage.from('ticket_attachments').upload(fileName, file);
                if (error) { showToast("Fehler beim Upload", "error"); btn.disabled = false; btn.style.opacity = '1'; return; }
                attachmentPath = data.path;
            }

            const { error } = await _supabase.from('ticket_messages').insert([{ ticket_id: ticketId, sender_id: currentUser.id, message: msgText, attachment_path: attachmentPath }]);
            if (error) {
                showToast("Fehler beim Senden", "error");
            } else {
                input.value = ''; fileInput.value = ''; document.getElementById('chat-file-name').classList.add('hidden');
                if(userProfile.role === 'admin') _supabase.from('tickets').update({status: 'In Bearbeitung'}).eq('id', ticketId).eq('status', 'Neu').then(()=>{});
                await fetchChatMessages(ticketId);
            }
            btn.disabled = false; btn.style.opacity = '1';
        }

            if(showingCompletedTickets) toggleCompletedTickets();

        async function fetchContacts() {
            const isAdmin = userProfile.role === 'admin';
            const { data, error } = await _supabase.from('contacts').select('*').order('company');
            const list = document.getElementById('contacts-list');
            
            if (error) { list.innerHTML = '<p class="text-red-500 text-base">Fehler beim Laden.</p>'; return; }
            
            let filteredData = data || [];
            
            if (!isAdmin) {
                const myBuildingId = userProfile.apartments?.building_id;
                filteredData = filteredData.filter(c => {
                    if (!c.building_ids || c.building_ids.length === 0) return true;
                    if (myBuildingId && c.building_ids.includes(myBuildingId)) return true;
                    return false;
                });
            }
            
            if (filteredData.length > 0) {
                list.innerHTML = filteredData.map(c => {
                    let catColor = "bg-gray-100 text-gray-600";
                    switch(c.category) {
                        case 'Sanitär': catColor = "bg-blue-100 text-blue-700"; break;
                        case 'Elektrik': catColor = "bg-yellow-100 text-yellow-700"; break;
                        case 'Hausverwaltung': catColor = "bg-hb-ultralight text-hb-olive"; break;
                        case 'Vermieter': catColor = "bg-green-100 text-green-700"; break;
                    }

                    const emergencyBadge = c.is_emergency ? `<span class="bg-red-500 text-white px-3 py-1 rounded text-[10px] font-bold tracking-widest uppercase shadow-sm animate-pulse">🚨 Notdienst</span>` : '';
                    const globalBadge = isAdmin && (!c.building_ids || c.building_ids.length === 0) ? `<span class="bg-gray-200 text-gray-600 px-3 py-1 rounded text-[10px] font-bold tracking-widest uppercase ml-2">GLOBAL</span>` : '';

                    return `
                    <div class="border border-gray-100 p-6 rounded-[15px] flex flex-col gap-4 group hover:border-hb-olive transition-colors bg-white shadow-sm relative overflow-hidden">
                        ${c.is_emergency ? `<div class="absolute top-0 right-0 w-20 h-20 bg-red-500 transform rotate-45 translate-x-10 -translate-y-10"></div>` : ''}
                        
                        <div class="flex justify-between items-start z-10">
                            <div>
                                <span class="${catColor} px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest">${c.category}</span>
                                ${emergencyBadge}
                                ${globalBadge}
                            </div>

                        </div>
                        
                        <div class="z-10 mt-2">

                            <p class="text-base font-semibold text-gray-700 ${c.company ? 'mt-1' : 'text-lg'}">${c.contact_person}</p>
                            ${c.address ? `<p class="text-xs text-gray-500 mt-2 leading-snug">${c.address}</p>` : ''}
                        </div>

                        <div class="mt-4 space-y-2 z-10 border-t border-gray-50 pt-4">
                            ${c.phone ? `<a href="tel:${c.phone.replace(/[^0-9+]/g, '')}" class="text-sm font-semibold text-gray-600 hover:text-hb-orange flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> ${c.phone}</a>` : ''}
                            ${c.mobile ? `<a href="tel:${c.mobile.replace(/[^0-9+]/g, '')}" class="text-sm font-semibold text-gray-600 hover:text-hb-orange flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg> ${c.mobile}</a>` : ''}

                        </div>

                `}).join('');
            } else {
                list.innerHTML = '<p class="text-base text-gray-400 italic col-span-2">Keine Kontakte vorhanden.</p>';

        }

        async function handleSaveContact(e) {
            e.preventDefault();
            const btn = document.getElementById('contact-submit-btn');
            btn.disabled = true; btn.textContent = "Speichere...";
            
            const selectedBuildings = Array.from(document.querySelectorAll('input[name="contact_buildings"]:checked')).map(cb => parseInt(cb.value));

            const payload = {
                company: document.getElementById('contact_company').value || null,
                contact_person: document.getElementById('contact_person').value,
                category: document.getElementById('contact_category').value,
                phone: document.getElementById('contact_phone').value || null,
                mobile: document.getElementById('contact_mobile').value || null,
                email: document.getElementById('contact_email').value || null,
                address: document.getElementById('contact_address').value || null,
                is_emergency: document.getElementById('contact_is_emergency').checked,
                building_ids: selectedBuildings.length > 0 ? selectedBuildings : null
            };
            
            const { error } = await _supabase.from('contacts').insert([payload]);
            if (error) {
                showToast(error.message, "error");
            } else {
                showToast("Kontakt angelegt");
                document.getElementById('contact-form').reset();
                fetchContacts();
            }
            btn.disabled = false; btn.textContent = "Speichern";
        }

        async function deleteContact(id) {
            if (confirm("Kontakt wirklich löschen?")) {
                await _supabase.from('contacts').delete().eq('id', id);
                fetchContacts(); 
                showToast("Kontakt gelöscht");
            }
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
