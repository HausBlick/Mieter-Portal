<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Verwaltung | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F5F5F5',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-hb-ultralight font-sans text-hb-offblack min-h-screen flex">

    <nav class="w-72 bg-white border-r border-gray-200 flex-shrink-0 min-h-screen flex flex-col shadow-sm">
        <div class="p-8 border-b border-gray-100">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-12 w-auto mb-4">
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-hb-olive">Portal Management</p>
        </div>
        
        <div class="flex-grow p-6">
            <ul class="space-y-2" id="nav-links">
                </ul>
        </div>

        <div class="p-8 border-t border-gray-100">
            <button onclick="logout()" class="text-xs uppercase tracking-widest font-semibold text-gray-400 hover:text-hb-orange transition-colors">
                Abmelden
            </button>
        </div>
    </nav>

    <main class="flex-grow p-12">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <p id="role-label" class="text-xs uppercase tracking-[0.2em] font-bold text-hb-olive mb-2"></p>
                <h1 id="welcome-title" class="text-4xl font-bold tracking-tight text-hb-offblack">Lade...</h1>
            </div>
        </header>

        <div id="content-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

<script>
    const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
    const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = 'index.html'; return; }

        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
        if (!profile) return;

        document.getElementById('welcome-title').textContent = profile.full_name;
        document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';

        renderNav(profile.role);
    }

    function renderNav(role) {
        const nav = document.getElementById('nav-links');
        const linkClass = "block p-3 text-sm font-medium hover:bg-hb-ultralight transition-all border-l-2 border-transparent hover:border-hb-olive cursor-pointer";
        
        if (role === 'admin') {
            nav.innerHTML = `
                <li><a onclick="location.reload()" class="${linkClass}">Übersicht</a></li>
                <li><a onclick="loadTenants()" class="${linkClass}">Einheiten & Zähler</a></li>
                <li class="mt-8 mb-2 px-3 text-[10px] uppercase tracking-widest font-bold text-gray-400">Verwaltung</li>
                <li><a href="#" class="${linkClass}">Dokumenten-Cloud</a></li>
                <li><a href="#" class="${linkClass}">Ticketsystem</a></li>
            `;
        }
    }

    async function loadTenants() {
        const container = document.getElementById('content-area');
        container.className = "space-y-8 col-span-full";
        
        container.innerHTML = `
            <div class="bg-white p-8 shadow-sm border-t-2 border-hb-olive">
                <h2 class="text-xl font-bold mb-6 uppercase tracking-wider">Einheit & Zähler erfassen</h2>
                <form id="apartment-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Wohnungsnummer</label>
                        <input type="text" id="apt_no" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="z.B. OG Rechts" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Kaltmiete (€)</label>
                        <input type="number" id="rent" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Nebenkosten (€)</label>
                        <input type="number" id="utils" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="0.00">
                    </div>
                    
                    <div class="md:col-span-3 pt-4 border-t border-gray-50">
                        <p class="text-[10px] font-bold uppercase text-gray-400 mb-4 tracking-widest text-center">Zählernummern</p>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Stromzähler</label>
                        <input type="text" id="m_elec" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="Nr. eingeben">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Wasserzähler</label>
                        <input type="text" id="m_water" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="Nr. eingeben">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Wärmezähler</label>
                        <input type="text" id="m_heat" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="Nr. eingeben">
                    </div>

                    <div class="md:col-span-3 pt-4 text-center">
                        <button type="submit" class="bg-hb-offblack text-white px-12 py-4 text-xs uppercase tracking-[0.2em] hover:bg-hb-olive transition-colors">
                            Einheit final speichern
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-8 shadow-sm border-t-2 border-hb-olive">
                <h2 class="text-xl font-bold mb-6 uppercase tracking-wider">Bestands-Liste</h2>
                <div id="tenants-list" class="divide-y divide-gray-100">
                    <p class="text-gray-400 italic text-sm">Lade Daten...</p>
                </div>
            </div>
        `;

        document.getElementById('apartment-form').addEventListener('submit', handleAddApartment);
        fetchApartments();
    }

    async function fetchApartments() {
        const { data } = await _supabase.from('apartments').select('*').order('apartment_number');
        const list = document.getElementById('tenants-list');
        
        if (data && data.length > 0) {
            list.innerHTML = data.map(apt => `
                <div class="py-6 flex flex-wrap justify-between items-start">
                    <div class="w-full md:w-1/3">
                        <p class="font-bold text-xl text-hb-offblack">${apt.apartment_number}</p>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-medium mt-1">Miete gesamt: ${(parseFloat(apt.rent_amount) + parseFloat(apt.utilities_amount)).toFixed(2)} €</p>
                    </div>
                    <div class="w-full md:w-2/3 grid grid-cols-3 gap-4 mt-4 md:mt-0 bg-hb-ultralight p-3">
                        <div>
                            <p class="text-[9px] uppercase text-gray-500 font-bold">Strom</p>
                            <p class="text-xs font-semibold">${apt.meter_electricity || '-'}</p>
                        </div>
                        <div>
                            <p class="text-[9px] uppercase text-gray-500 font-bold">Wasser</p>
                            <p class="text-xs font-semibold">${apt.meter_water || '-'}</p>
                        </div>
                        <div>
                            <p class="text-[9px] uppercase text-gray-500 font-bold">Wärme</p>
                            <p class="text-xs font-semibold">${apt.meter_heating || '-'}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<p class="text-gray-400 text-sm">Keine Einheiten gefunden.</p>';
        }
    }

    async function handleAddApartment(e) {
        e.preventDefault();
        const { data: { user } } = await _supabase.auth.getUser();
        
        const payload = {
            apartment_number: document.getElementById('apt_no').value,
            rent_amount: document.getElementById('rent').value,
            utilities_amount: document.getElementById('utils').value,
            meter_electricity: document.getElementById('m_elec').value,
            meter_water: document.getElementById('m_water').value,
            meter_heating: document.getElementById('m_heat').value
        };

        const { error } = await _supabase.from('apartments').insert([payload]);

        if (error) {
            alert("Speichern fehlgeschlagen. Hast du die Spalten in Supabase schon angelegt?");
        } else {
            loadTenants();
        }
    }

    async function logout() {
        await _supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    init();
</script>
</body>
</html>
