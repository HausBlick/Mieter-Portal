        tailwind.config = {

                extend: {
                    colors: {

                        'hb-offblack': '#373737',

    <style>
        body { background-color: #F9FAF8; font-size: 16px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        
        .nav-link { border-radius: 15px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; font-weight: 600; box-shadow: 0 4px 10px rgba(104, 116, 81, 0.2); }
        .active-link svg { stroke: white !important; }
        
        input, select, textarea { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 16px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); outline: none; }
        input[type="checkbox"] { border-radius: 4px; width: 1.2rem; height: 1.2rem; accent-color: #EB762D; cursor: pointer; padding: 0; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .btn-primary { background-color: #687451; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(104, 116, 81, 0.2); }
        .btn-secondary { background-color: #373737; color: white; border-radius: 15px; transition: all 0.2s; font-weight: 600; }
        .btn-secondary:hover { background-color: #2a2a2a; transform: translateY(-1px); }

        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }

        .message-appear { animation: fadeInScale 0.2s ease-out forwards; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Profile Dropdown logic */
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-hb-orange' : 'bg-hb-olive';
            toast.className = `${bgColor} text-white px-8 py-5 rounded-[15px] shadow-2xl flex items-center gap-4 transform transition-all duration-300 translate-y-10 opacity-0 z-50`;
            toast.innerHTML = `<span class="text-sm font-bold tracking-wide">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleUserDropdown(event) {
            event.stopPropagation();
            document.getElementById('user-dropdown').classList.toggle('dropdown-open');
        }

        function closeDropdowns(event) {
            const dropdown = document.getElementById('user-dropdown');
            if (dropdown && !event.target.closest('.dropdown-container')) {
                dropdown.classList.remove('dropdown-open');
            }
        }

        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                // Sicheres Laden NUR des Profils (keine Ambiguity Fehler mehr)
                const { data: profile, error: profileError } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                
                if (profileError || !profile) { 
                    document.getElementById('welcome-title').textContent = "Profilfehler"; 
                    return; 
                }
                userProfile = profile;

                // Gebäude separat laden, falls Mieter
                if (userProfile.role === 'tenant' && userProfile.apartment_id) {
                    const { data: aptData } = await _supabase.from('apartments').select('building_id').eq('id', userProfile.apartment_id).single();
                    if (aptData) userProfile.apartments = { building_id: aptData.building_id };
                }

                const firstName = profile.full_name ? profile.full_name.split(' ')[0] : 'Nutzer';
                
                document.getElementById('welcome-title').textContent = "Hallo, " + firstName + "!";
                document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';
                document.getElementById('user-avatar').textContent = firstName.charAt(0).toUpperCase();
                document.getElementById('dropdown-name').textContent = profile.full_name || 'Kein Name';
                document.getElementById('dropdown-email').textContent = profile.email;

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

            if (role === 'admin') {
                nav.innerHTML = `

                    <li class="${sectionClass}">Kommunikation</li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Mieter-Tickets</a></li>
                    <li class="${sectionClass}">Mieterverwaltung</li>
                    <li><a onclick="loadUserManagement(); setActiveNav('nav-users')" id="nav-users" class="${itemClass}">${icons.users} Meine Mieter</a></li>
                    <li><a onclick="loadTenants(); setActiveNav('nav-apartments')" id="nav-apartments" class="${itemClass}">${icons.buildings} Objekte & Einheiten</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Dokumente</a></li>
                    <li class="${sectionClass}">Service</li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            } else {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Meine Tickets</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Meine Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>

        function setActiveNav(id) {
            if(currentChatInterval) clearInterval(currentChatInterval);
            document.querySelectorAll('#nav-links a').forEach(el => el.classList.remove('active-link'));
            const activeEl = document.getElementById(id);
            if (activeEl) activeEl.classList.add('active-link');
            if(window.innerWidth < 768) toggleMenu();
        }

        function formatText(text) {
            if (!text) return "";
            let formatted = text
                .replace(/^---$/gm, '<hr class="my-8 border-gray-100">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="text-hb-olive underline font-bold hover:text-hb-orange transition-colors">$1</a>')
                .replace(/^- (.*$)/gim, '<li>$1</li>');
            if (formatted.includes('<li>')) formatted = formatted.replace(/(<li>.*<\/li>)/gms, '<ul class="list-disc pl-5 space-y-1">$1</ul>');
            return formatted.split('\n').join('<br>');
        }

        // --- ZENTRALE VORSCHAU FUNKTION & "NEU" STATUS ENTFERNEN ---
        async function viewDoc(docId, path, readByStr, bucket = 'documents') {
            // "Neu" Flag reparieren
            if (docId && bucket === 'documents' && userProfile.role === 'tenant') {
                 let readBy = [];
                 try { readBy = JSON.parse(readByStr); } catch(e){}
                 
                 if(!readBy.includes(currentUser.id)) {
                     readBy.push(currentUser.id);
                     await _supabase.from('documents').update({read_by: readBy}).eq('id', docId);
                     // Badge sofort im DOM verstecken für flüssige Experience
                     const badge = document.getElementById('badge-' + docId);
                     if(badge) badge.remove();
                 }
            }

            // Signed URL generieren
            const { data, error } = await _supabase.storage.from(bucket).createSignedUrl(path, 3600); 
            if (error) { 
                showToast("Fehler beim Öffnen", "error"); 
                return; 
            }
            window.open(data.signedUrl, '_blank');
        }

                apartment_number: document.getElementById('apt_no').value,
                rent_amount: parseFloat(document.getElementById('rent').value) || 0,

                meter_heating: document.getElementById('m_heat').value
            };
            if (currentEditingId) await _supabase.from('apartments').update(payload).eq('id', currentEditingId);

        async function editApartment(id) {
            const { data: apt } = await _supabase.from('apartments').select('*').eq('id', id).single();
            if (apt) {
                currentEditingId = id;
                document.getElementById('b_id').value = apt.building_id;
                document.getElementById('apt_no').value = apt.apartment_number;
                document.getElementById('rent').value = apt.rent_amount;
                document.getElementById('utils').value = apt.utilities_amount;
                document.getElementById('sq_m').value = apt.sq_meters;
                if(document.getElementById('m_elec')) document.getElementById('m_elec').value = apt.meter_electricity || '';
                if(document.getElementById('m_water')) document.getElementById('m_water').value = apt.meter_water || '';
                if(document.getElementById('m_heat')) document.getElementById('m_heat').value = apt.meter_heating || '';
                document.getElementById('form-title').textContent = "Einheit bearbeiten";
                document.getElementById('submit-btn').textContent = "Änderungen speichern";
                document.getElementById('cancel-btn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

                email: email,

        async function fetchNews() {
            const { data: newsData, error: newsError } = await _supabase.from('news').select('*, buildings(name)').order('created_at', { ascending: false });
            const { data: profData } = await _supabase.from('profiles').select('id, full_name');
            const profMap = {};
            if(profData) profData.forEach(p => profMap[p.id] = p.full_name);

            if (newsError) return;

            let filteredNews = newsData;
            if (userProfile.role === 'tenant') {
                if(userProfile.apartments && userProfile.apartments.building_id) {
                    filteredNews = newsData.filter(n => !n.building_id || n.building_id === userProfile.apartments.building_id);
                } else {
                    filteredNews = newsData.filter(n => !n.building_id);
                }
            }

            filteredNews.forEach(n => n.profiles = { full_name: profMap[n.author_id] || 'HB Verwaltung' });
            
            allNews = filteredNews; 
            renderNewsFeed();
        }

        function renderNewsFeed() {
            const list = document.getElementById('news-list');
            const isAdmin = userProfile.role === 'admin';
            let filtered = allNews.filter(n => {
                const matchesSearch = n.title.toLowerCase().includes(newsSearchQuery.toLowerCase()) || n.content.toLowerCase().includes(newsSearchQuery.toLowerCase());
                const matchesCat = newsCategoryFilter === "" || n.category === newsCategoryFilter;
                return matchesSearch && matchesCat;
            });

            if (filtered.length > 0) {
                list.innerHTML = filtered.map(n => {
                    let likedBy = [];
                    try { likedBy = n.liked_by || []; } catch(e){}
                    const hasLiked = likedBy.includes(currentUser.id);
                    const likeIconColor = hasLiked ? 'text-hb-orange fill-current' : 'text-gray-300';

                    return `
                    <div class="card p-10 text-left">
                        <div class="flex justify-between items-start mb-8 text-left">
                            <div class="flex items-center gap-5 text-left">
                                <div class="w-14 h-14 bg-hb-olive text-white font-extrabold flex items-center justify-center rounded-full text-xl uppercase text-left shadow-sm">${(n.profiles?.full_name || 'HB').charAt(0)}</div>
                                <div class="text-left">
                                    <p class="text-lg font-bold text-hb-offblack text-left">${n.profiles?.full_name || 'HB Verwaltung'}</p>
                                    <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mt-1 text-left">${new Date(n.created_at).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })}${isAdmin && n.buildings?.name ? ` • ${n.buildings.name}` : ''}</p>

                                ${isAdmin ? `<div class="flex gap-4 mt-2 text-left"><button onclick="editNews('${n.id}')" class="text-xs font-bold text-hb-olive hover:underline text-left">Bearbeiten</button><button onclick="deleteNews('${n.id}')" class="text-xs font-bold text-hb-orange hover:underline text-left">Löschen</button></div>` : ''}
                            </div>
                        </div>
                        <div class="mb-8 text-left">
                            <h3 class="text-2xl font-extrabold text-hb-offblack mb-4 text-left">${n.title}</h3>
                            <div class="news-content text-base text-gray-600 leading-relaxed text-left">${formatText(n.content)}</div>
                        </div>
                        <div class="pt-6 border-t border-gray-50 flex items-center gap-6 text-left">
                            <button onclick="handleLike('${n.id}')" class="flex items-center gap-3 transition-all hover:opacity-75 text-left" ${hasLiked ? 'title="Bereits geliked"' : ''}>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 ${likeIconColor}" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" /></svg>
                                <span class="text-lg font-bold ${hasLiked ? 'text-hb-orange' : 'text-gray-400'} text-left">${n.likes || 0}</span>

                        </div>

                }).join('');
            } else { list.innerHTML = '<p class="py-16 text-center text-gray-400 italic text-base text-left">Keine Einträge gefunden.</p>'; }

        async function handleSaveNews(e) {
            e.preventDefault();
            const payload = { title: document.getElementById('news_title').value, category: document.getElementById('news_category').value, content: document.getElementById('news_content').value, building_id: document.getElementById('news_b_id').value || null, author_id: currentUser.id };
            if (currentEditingNewsId) await _supabase.from('news').update(payload).eq('id', currentEditingNewsId);
            else await _supabase.from('news').insert([payload]);
            resetNewsForm(); fetchNews(); showToast("Aushang veröffentlicht");
        }

        async function handleLike(id) {
            const newsItem = allNews.find(n => n.id === id);
            if (!newsItem) return;
            
            let likedBy = [];
            try { likedBy = newsItem.liked_by || []; } catch(e){}

            if (likedBy.includes(currentUser.id)) {
                showToast("Du hast diesen Beitrag bereits geliked", "error");
                return;
            }

            likedBy.push(currentUser.id);
            const currentLikes = (newsItem.likes || 0) + 1;

            const { error } = await _supabase.from('news').update({ likes: currentLikes, liked_by: likedBy }).eq('id', id);
            if (error) {
                showToast("Like konnte nicht gespeichert werden.", "error");
            } else {
                fetchNews();
            }
        }

        function handleNewsFilter(val) { newsCategoryFilter = val; renderNewsFeed(); }

        async function editNews(id) {
            const { data: n } = await _supabase.from('news').select('*').eq('id', id).single();
            if (n) {
                currentEditingNewsId = id;
                document.getElementById('news_title').value = n.title;
                document.getElementById('news_category').value = n.category;
                document.getElementById('news_content').value = n.content;
                document.getElementById('news_b_id').value = n.building_id || '';
                document.getElementById('news-form-title').innerHTML = `${icons.news} Aushang bearbeiten`;
                document.getElementById('news-submit-btn').textContent = "Speichern";
                document.getElementById('news-cancel-btn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetNewsForm() {
            currentEditingNewsId = null;
            document.getElementById('news-form').reset();
            document.getElementById('news-form-title').innerHTML = `${icons.news} Neuer Aushang`;
            document.getElementById('news-submit-btn').textContent = "Veröffentlichen";
            document.getElementById('news-cancel-btn').classList.add('hidden');

        async function handleUpload(e) {
            e.preventDefault();
            const file = document.getElementById('file-input').files[0];
            const btn = document.getElementById('upload-btn');
            if (!file) return;
            btn.disabled = true; btn.textContent = "Upload...";
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await _supabase.storage.from('documents').upload(fileName, file);
            if (!uploadError) {
                await _supabase.from('documents').insert([{
                    title: document.getElementById('doc_title').value,
                    category: document.getElementById('doc_category').value,
                    file_path: uploadData.path,
                    tenant_id: document.getElementById('doc_tenant_id').value || null
                }]);
                showToast("Dokument gespeichert!"); loadDocuments();
            } else { showToast("Fehler", "error"); btn.disabled = false; }
        }

        function handleDocSearch(val) { docSearchQuery = val; renderDocsFeed(); }
        function handleDocFilter(val) { docCategoryFilter = val; renderDocsFeed(); }

        async function fetchDocuments() {
            const isAdmin = userProfile.role === 'admin';
            const { data: docsData, error } = await _supabase.from('documents').select('*');
            const { data: profData } = await _supabase.from('profiles').select('id, full_name');
            
            if (error) return;

            const profMap = {};
            if(profData) profData.forEach(p => profMap[p.id] = p.full_name);

            let filteredDocs = docsData;
            if (!isAdmin) {
                filteredDocs = docsData.filter(d => d.tenant_id === null || d.tenant_id === currentUser.id);
            }
            
            filteredDocs.forEach(d => d.profiles = { full_name: profMap[d.tenant_id] });

            if (filteredDocs) {
                allDocs = filteredDocs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                renderDocsFeed();
            }
        }

            });

            if (filtered.length > 0) {
                if(!isAdmin) {
                    filtered.sort((a, b) => {
                        const aReadBy = a.read_by || [];
                        const bReadBy = b.read_by || [];
                        const aUnread = !aReadBy.includes(currentUser.id);
                        const bUnread = !bReadBy.includes(currentUser.id);

                        if (!aUnread && bUnread) return 1;
                        return 0;

        async function fetchContacts() {

            const { data, error } = await _supabase.from('contacts').select('*').order('company');

            let filteredData = data || [];
            
            if (!isAdmin) {
                const myBuildingId = userProfile.apartments?.building_id;
                filteredData = filteredData.filter(c => {
                    if (!c.building_ids || c.building_ids.length === 0) return true;
                    if (myBuildingId && c.building_ids.includes(myBuildingId)) return true;
                    return false;
                });
            }
            
            if (filteredData.length > 0) {
                list.innerHTML = filteredData.map(c => {
                    let catColor = "bg-gray-100 text-gray-600";
                    switch(c.category) {
                        case 'Sanitär': catColor = "bg-blue-100 text-blue-700"; break;
                        case 'Elektrik': catColor = "bg-yellow-100 text-yellow-700"; break;
                        case 'Hausverwaltung': catColor = "bg-hb-ultralight text-hb-olive"; break;
                        case 'Vermieter': catColor = "bg-green-100 text-green-700"; break;

                    const globalBadge = isAdmin && (!c.building_ids || c.building_ids.length === 0) ? `<span class="bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg text-[10px] font-bold tracking-widest uppercase ml-2 text-left">GLOBAL</span>` : '';

                    return `
                    <div class="border border-gray-100 p-8 rounded-[15px] flex flex-col gap-4 group hover:border-hb-olive transition-colors bg-white shadow-sm relative overflow-hidden text-left">
                        ${c.is_emergency ? `<div class="absolute top-0 right-0 w-24 h-24 bg-red-500 transform rotate-45 translate-x-12 -translate-y-12 text-left"></div>` : ''}

                                <span class="${catColor} px-4 py-2 rounded-xl text-[10px] font-extrabold uppercase tracking-widest text-left">${c.category}</span>

                            </div>

                                <button onclick="deleteContact('${c.id}')" class="text-xs font-bold text-red-500 opacity-0 group-hover:opacity-100 transition-opacity hover:underline text-left">Löschen</button>

        async function handleSaveContact(e) {
            e.preventDefault();
            const btn = document.getElementById('contact-submit-btn');
            btn.disabled = true; btn.textContent = "Speichere...";
            
            const selectedBuildings = Array.from(document.querySelectorAll('input[name="contact_buildings"]:checked')).map(cb => parseInt(cb.value));

            const payload = {
                company: document.getElementById('contact_company').value || null,
                contact_person: document.getElementById('contact_person').value,
                category: document.getElementById('contact_category').value,
                phone: document.getElementById('contact_phone').value || null,
                mobile: document.getElementById('contact_mobile').value || null,
                email: document.getElementById('contact_email').value || null,
                address: document.getElementById('contact_address').value || null,
                is_emergency: document.getElementById('contact_is_emergency').checked,
                building_ids: selectedBuildings.length > 0 ? selectedBuildings : null
            };
            
            let res;
            if (currentEditingContactId) {
                res = await _supabase.from('contacts').update(payload).eq('id', currentEditingContactId);
            } else {
                res = await _supabase.from('contacts').insert([payload]);
            }
            
            if (res.error) {
                showToast(res.error.message, "error");
            } else {
                showToast(currentEditingContactId ? "Kontakt aktualisiert" : "Kontakt angelegt");
                resetContactForm();
                fetchContacts();
            }
            btn.disabled = false; btn.textContent = "Speichern";
        }

        async function editContact(id) {
            const { data: c } = await _supabase.from('contacts').select('*').eq('id', id).single();
            if (c) {
                currentEditingContactId = id;
                document.getElementById('contact_company').value = c.company || '';
                document.getElementById('contact_person').value = c.contact_person || '';
                document.getElementById('contact_category').value = c.category || 'Sonstiges';
                document.getElementById('contact_phone').value = c.phone || '';
                document.getElementById('contact_mobile').value = c.mobile || '';
                document.getElementById('contact_email').value = c.email || '';
                document.getElementById('contact_address').value = c.address || '';
                document.getElementById('contact_is_emergency').checked = c.is_emergency || false;
                
                const checkboxes = document.querySelectorAll('input[name="contact_buildings"]');
                checkboxes.forEach(cb => {
                    cb.checked = c.building_ids && c.building_ids.includes(parseInt(cb.value));
                });

                const title = document.getElementById('contact-form-title');
                if(title) title.innerHTML = `${icons.contact} Kontakt bearbeiten`;
                const submitBtn = document.getElementById('contact-submit-btn');
                if(submitBtn) submitBtn.textContent = "Änderungen speichern";
                const cancelBtn = document.getElementById('contact-cancel-btn');
                if(cancelBtn) cancelBtn.classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetContactForm() {
            currentEditingContactId = null;
            const form = document.getElementById('contact-form');
            if(form) form.reset();
            const title = document.getElementById('contact-form-title');
            if(title) title.innerHTML = `${icons.contact} Neuen Kontakt anlegen`;
            const submitBtn = document.getElementById('contact-submit-btn');
            if(submitBtn) submitBtn.textContent = "Speichern";
            const cancelBtn = document.getElementById('contact-cancel-btn');
            if(cancelBtn) cancelBtn.classList.add('hidden');
        }

        async function deleteContact(id) {
            if (confirm("Kontakt wirklich löschen?")) {
                await _supabase.from('contacts').delete().eq('id', id);
                fetchContacts(); 
                showToast("Kontakt gelöscht");
            }
        }

        /* --- TICKETS BOARD & CHAT --- */
        async function fetchTicketsBoard() {
            const isAdmin = userProfile.role === 'admin';
            
            // JS Mapping statt Supabase-Join, um Mehrdeutigkeiten bei den UUIDs zu vermeiden
            const { data: ticketsData, error } = await _supabase.from('tickets').select('*').neq('status', 'Erledigt').order('created_at', { ascending: false });
            const { data: profData } = await _supabase.from('profiles').select('id, full_name');
            
            if (error) return showToast(error.message, "error");

            const profMap = {};
            if(profData) profData.forEach(p => profMap[p.id] = p.full_name);

            let filteredTickets = ticketsData;
            if(!isAdmin) {
                filteredTickets = ticketsData.filter(t => t.tenant_id === currentUser.id);
            }
            
            filteredTickets.forEach(t => t.profiles = { full_name: profMap[t.tenant_id] || 'Unbekannt' });

            if (isAdmin) {
                const nT = filteredTickets.filter(t => t.status === 'Neu' || t.status === 'Offen');
                const pT = filteredTickets.filter(t => t.status === 'In Bearbeitung');
                const hT = filteredTickets.filter(t => t.status === 'Wartend');

                document.getElementById('count-new').textContent = nT.length;
                document.getElementById('count-progress').textContent = pT.length;
                document.getElementById('count-hold').textContent = hT.length;

                document.getElementById('board-new').innerHTML = nT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-base text-gray-400 font-bold text-left">Leer</div>';
                document.getElementById('board-progress').innerHTML = pT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-base text-gray-400 font-bold text-left">Leer</div>';
                document.getElementById('board-hold').innerHTML = hT.map(t => generateTicketCard(t)).join('') || '<div class="border-2 border-dashed border-gray-200 rounded-[15px] p-8 text-center text-base text-gray-400 font-bold text-left">Leer</div>';
            } else {
                const list = document.getElementById('tenant-ticket-list');
                list.innerHTML = filteredTickets.map(t => generateTicketCard(t)).join('') || '<p class="text-base italic text-gray-400 text-left">Keine aktiven Meldungen.</p>';
            }
        }

            showingCompletedTickets = !showingCompletedTickets;

            if(showingCompletedTickets) {
                container.classList.remove('hidden');
                container.innerHTML = '<p class="text-base text-gray-400 italic text-left">Lade...</p>';

                const { data: ticketsData, error } = await _supabase.from('tickets').select('*').eq('status', 'Erledigt').order('created_at', { ascending: false });
                const { data: profData } = await _supabase.from('profiles').select('id, full_name');
                
                if (error) { container.innerHTML = `<p class="text-red-500 text-left">Fehler: ${error.message}</p>`; return; }

                const profMap = {};

                let filteredTickets = ticketsData;

        function generateTicketCard(t, isCompleted = false) {

            let borderCol = isNew ? 'border-red-200 hover:border-red-400' : (t.status === 'In Bearbeitung' ? 'border-orange-200 hover:border-hb-orange' : 'border-gray-200 hover:border-gray-400');
            
            if(isCompleted) borderCol = 'border-gray-200 bg-gray-50 opacity-75 hover:opacity-100 hover:border-gray-400';

            return `
                <div onclick="viewTicketChat('${t.id}')" class="bg-white p-6 rounded-[15px] shadow-sm border-2 ${borderCol} cursor-pointer transition-all transform hover:-translate-y-1 text-left">
                    <div class="flex justify-between items-center mb-4 text-left">

                    <h4 class="text-base font-extrabold text-hb-offblack leading-tight mb-4 text-left text-balance">${t.title}</h4>
                    <p class="text-[11px] text-gray-500 font-bold mt-4 pt-4 border-t border-gray-50 flex items-center gap-2 text-left uppercase tracking-widest">

                        ${t.profiles?.full_name || 'Unbekannt'}
                    </p>
                </div>
            `;
        }

                    <div class="p-4 md:p-6 border-t border-gray-100 bg-white text-left">
                        <form id="chat-reply-form" class="flex gap-3 md:gap-4 items-end text-left relative">
                            <div class="flex-grow relative text-left">
                                <textarea id="chat_msg_input" rows="2" class="w-full rounded-[15px] border-2 border-gray-100 p-4 pr-14 focus:outline-none focus:border-hb-olive text-base resize-none shadow-inner text-left bg-gray-50 focus:bg-white transition-colors" placeholder="Ihre Nachricht..." required></textarea>
                                <label class="absolute right-3 bottom-3 p-2 cursor-pointer text-gray-400 hover:text-hb-olive transition-colors bg-white rounded-lg shadow-sm border border-gray-50 text-left flex items-center justify-center" title="Datei anhängen">
                                    <svg class="h-5 w-5 text-left" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                                    <input type="file" id="chat_file_input" class="hidden text-left">
                                </label>
                            </div>
                            <button type="submit" id="chat-send-btn" class="bg-hb-olive text-white w-14 h-14 rounded-[15px] flex items-center justify-center hover:bg-hb-offblack transition-all shadow-md text-left flex-shrink-0 hover:-translate-y-1">
                                <svg class="h-6 w-6 text-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </form>
                        <div id="chat-file-name" class="text-[10px] text-hb-olive font-extrabold uppercase tracking-widest mt-2 ml-2 hidden flex items-center gap-1 text-left"><svg class="w-3 h-3 text-left" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg> <span class="text-left truncate max-w-xs"></span></div>
                    </div>
                </div>
            `;

            document.getElementById('chat_file_input').addEventListener('change', function() {
                const nameDisplay = document.getElementById('chat-file-name');
                if(this.files[0]) {
                    nameDisplay.querySelector('span').textContent = this.files[0].name;
                    nameDisplay.classList.remove('hidden');
                } else { nameDisplay.classList.add('hidden'); }
            });

            document.getElementById('chat-reply-form').addEventListener('submit', (e) => handleSendChatMessage(e, ticketId));
            
            await fetchChatMessages(ticketId);
            if(currentChatInterval) clearInterval(currentChatInterval);
            currentChatInterval = setInterval(() => fetchChatMessages(ticketId, true), 10000);
        }

        async function fetchChatMessages(ticketId, silent = false) {
            const { data: msgData, error } = await _supabase.from('ticket_messages').select('*').eq('ticket_id', ticketId).order('created_at', { ascending: true });
            const { data: profData } = await _supabase.from('profiles').select('id, full_name, role');
            
            if (error) return;

            const profMap = {};
            if(profData) profData.forEach(p => profMap[p.id] = p);

            const box = document.getElementById('chat-messages');
            if (msgData && msgData.length > 0) {
                const isAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;

                box.innerHTML = msgData.map(msg => {
                    const isMe = msg.sender_id === currentUser.id;
                    const wrapperClass = isMe ? "justify-end text-right" : "justify-start text-left";
                    const alignClass = isMe ? "items-end" : "items-start";
                    
                    const bgClass = isMe 
                        ? "bg-hb-olive text-white rounded-[20px] rounded-br-[4px] shadow-sm" 
                        : "bg-white text-hb-offblack border border-gray-200 rounded-[20px] rounded-bl-[4px] shadow-sm";
                    
                    const senderProfile = profMap[msg.sender_id] || {};
                    const senderName = isMe ? "Ich" : (senderProfile.full_name || 'System');
                    
                    let attachmentHtml = "";
                    if (msg.attachment_path) {
                        const btnClass = isMe 
                            ? "bg-white/20 hover:bg-white/30 text-white border-transparent" 
                            : "bg-gray-50 hover:bg-gray-100 text-hb-olive border-gray-100";
                            
                        attachmentHtml = `
                        <div class="mt-3">
                            <button type="button" onclick="viewDoc(null, '${msg.attachment_path}', null, 'ticket_attachments')" class="text-xs font-extrabold flex items-center justify-center gap-2 w-full py-2.5 px-4 rounded-xl transition-colors border ${btnClass}">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> 
                                ANHANG ANZEIGEN
                            </button>
                        </div>`;
                    }

                    const cleanMessage = msg.message ? msg.message.trim() : '';

                    return `
                    <div class="flex w-full ${wrapperClass} mb-4 message-appear text-left">
                        <div class="flex flex-col ${alignClass} max-w-[85%] md:max-w-[70%]">
                            <div class="flex items-center gap-2 mb-1.5 px-1">
                                <span class="text-[10px] uppercase tracking-widest text-gray-400 font-extrabold">${senderName}</span>
                                <span class="text-[10px] text-gray-400 font-medium">${new Date(msg.created_at).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="px-5 py-3 text-[15px] leading-snug whitespace-pre-wrap break-words text-left inline-block w-fit max-w-full ${bgClass}">
                                ${cleanMessage}
                                ${attachmentHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                if (!silent || isAtBottom) box.scrollTop = box.scrollHeight;
            } else { box.innerHTML = '<div class="text-center py-20 text-gray-400 italic text-base text-left">Senden Sie Ihre erste Nachricht, um den Chat zu starten.</div>'; }
        }

        async function handleSendChatMessage(e, ticketId) {
            e.preventDefault();
            const input = document.getElementById('chat_msg_input');
            const fileInput = document.getElementById('chat_file_input');
            const btn = document.getElementById('chat-send-btn');
            const file = fileInput.files[0];
            const msgText = input.value.trim();
            if (!msgText && !file) return;

            btn.disabled = true; btn.style.opacity = '0.5';
            let attachmentPath = null;

            if (file) {
                const fileName = `${ticketId}/${Date.now()}_${file.name}`;
                const { data, error } = await _supabase.storage.from('ticket_attachments').upload(fileName, file);
                if (error) { showToast("Fehler beim Upload", "error"); btn.disabled = false; btn.style.opacity = '1'; return; }
                attachmentPath = data.path;
            }

            const { error } = await _supabase.from('ticket_messages').insert([{ ticket_id: ticketId, sender_id: currentUser.id, message: msgText, attachment_path: attachmentPath }]);
            if (error) {
                showToast("Fehler beim Senden", "error");
            } else {
                input.value = ''; fileInput.value = ''; document.getElementById('chat-file-name').classList.add('hidden');
                if(userProfile.role === 'admin') _supabase.from('tickets').update({status: 'In Bearbeitung'}).eq('id', ticketId).eq('status', 'Neu').then(()=>{});
                await fetchChatMessages(ticketId);
            }
            btn.disabled = false; btn.style.opacity = '1';
        }

        async function updateTicketStatus(id, newStatus) {
            const { error } = await _supabase.from('tickets').update({ status: newStatus }).eq('id', id);
            if (error) showToast(error.message, "error"); else showToast("Status geändert");
            fetchTicketsBoard();
            if(showingCompletedTickets) toggleCompletedTickets(); 
        }

        async function openNewTicketModal() {
            const isAdmin = userProfile.role === 'admin';
            let tenantOptions = '';
            if (isAdmin) {
                const { data: tenants } = await _supabase.from('profiles').select('id, full_name, apartments(apartment_number)').eq('role', 'tenant');
                tenantOptions = tenants?.map(t => `<option value="${t.id}">${t.full_name} (WE ${t.apartments?.apartment_number || ''})</option>`).join('') || '';
            }

            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="card p-8 md:p-12 text-left">
                    <div class="flex justify-between items-center mb-8 text-left">
                        <h2 class="text-2xl font-bold uppercase tracking-widest text-hb-offblack text-left">${isAdmin ? 'Ticket an Mieter senden' : 'Neue Meldung'}</h2>
                        <button onclick="loadTickets()" class="text-xs uppercase font-bold text-gray-400 hover:text-hb-orange text-left text-balance">Abbrechen</button>
                    </div>
                    <form id="new-ticket-form" class="space-y-6 text-left">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                            ${isAdmin ? `<div class="text-left"><label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Empfänger (Mieter)</label><select id="nt_tenant_id" class="w-full p-4 text-base text-left" required><option value="" disabled selected>Bitte wählen...</option>${tenantOptions}</select></div>` : ''}
                            <div class="${isAdmin ? '' : 'col-span-2 md:col-span-1'} text-left">
                                <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Kategorie</label>
                                <select id="nt_category" class="w-full p-4 text-base text-left" required>
                                    <option value="Reparatur">Reparatur / Mangel</option><option value="Allgemein">Allgemeine Anfrage</option><option value="Termin">Termin</option>
                                    ${isAdmin ? '<option value="Mahnung">Verwarnung</option>' : '<option value="Beschwerde">Beschwerde</option>'}
                                </select>
                            </div>
                            <div class="col-span-1 md:col-span-2 text-left">
                                <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Betreff</label>
                                <input type="text" id="nt_title" class="w-full p-4 text-base text-left" placeholder="Zusammenfassung..." required>
                            </div>
                        </div>
                        <div class="text-left">
                            <label class="block text-xs font-bold uppercase text-gray-500 tracking-widest mb-1 text-left">Nachricht</label>
                            <textarea id="nt_message" rows="5" class="w-full p-4 text-base text-left" placeholder="Beschreiben Sie das Anliegen..." required></textarea>
                        </div>
                        <div class="pt-4 flex justify-end text-left">
                            <button type="submit" id="nt-submit-btn" class="btn-primary px-10 py-4 text-base text-left">Ticket Eröffnen</button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('new-ticket-form').addEventListener('submit', createNewTicketProcess);
        }

        async function createNewTicketProcess(e) {
            e.preventDefault();
            const btn = document.getElementById('nt-submit-btn');
            btn.disabled = true; btn.textContent = "Erstelle...";
            const isAdmin = userProfile.role === 'admin';
            const targetTenantId = isAdmin ? document.getElementById('nt_tenant_id').value : currentUser.id;
            
            const { data: newTicket, error: ticketError } = await _supabase.from('tickets').insert([{
                title: document.getElementById('nt_title').value, category: document.getElementById('nt_category').value, tenant_id: targetTenantId, creator_id: currentUser.id, description: document.getElementById('nt_message').value, status: 'Neu'
            }]).select('id').single();

            if (ticketError) { showToast(ticketError.message, "error"); btn.disabled = false; return; }

            const { error: msgError } = await _supabase.from('ticket_messages').insert([{ ticket_id: newTicket.id, sender_id: currentUser.id, message: document.getElementById('nt_message').value }]);
            if (msgError) showToast("Fehler bei Nachricht", "error"); else showToast("Ticket erstellt!");
            viewTicketChat(newTicket.id);
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
