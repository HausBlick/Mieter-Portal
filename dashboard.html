<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Verwaltung | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F5F5F5',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-hb-ultralight font-sans text-hb-offblack min-h-screen flex">

    <nav class="w-72 bg-white border-r border-gray-200 flex-shrink-0 min-h-screen flex flex-col shadow-sm">
        <div class="p-8 border-b border-gray-100">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-12 w-auto mb-4">
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-hb-olive">Portal Management</p>
        </div>
        
        <div class="flex-grow p-6">
            <ul class="space-y-2" id="nav-links">
                </ul>
        </div>

        <div class="p-8 border-t border-gray-100">
            <button onclick="logout()" class="text-xs uppercase tracking-widest font-semibold text-gray-400 hover:text-hb-orange transition-colors">
                Abmelden
            </button>
        </div>
    </nav>

    <main class="flex-grow p-12">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <p id="role-label" class="text-xs uppercase tracking-[0.2em] font-bold text-hb-olive mb-2"></p>
                <h1 id="welcome-title" class="text-4xl font-bold tracking-tight text-hb-offblack">Lade...</h1>
            </div>
        </header>

        <div id="content-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

<script>
    const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
    const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = 'index.html'; return; }

        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
        if (!profile) return;

        document.getElementById('welcome-title').textContent = profile.full_name;
        document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';

        renderNav(profile.role);
    }

    function renderNav(role) {
        const nav = document.getElementById('nav-links');
        const linkClass = "block p-3 text-sm font-medium hover:bg-hb-ultralight transition-all border-l-2 border-transparent hover:border-hb-olive cursor-pointer";
        
        // Navigation für Admin/Vermieter
        if (role === 'admin') {
            nav.innerHTML = `
                <li><a onclick="location.reload()" class="${linkClass}">Übersicht</a></li>
                <li><a onclick="loadTenants()" class="${linkClass}">Mieter-Stammdaten</a></li>
                <li class="mt-8 mb-2 px-3 text-[10px] uppercase tracking-widest font-bold text-gray-400">Verwaltung</li>
                <li><a href="#" class="${linkClass}">Zählerübersicht</a></li>
                <li><a href="#" class="${linkClass}">Alle Tickets</a></li>
            `;
        } else {
            // Navigation für Mieter
            nav.innerHTML = `
                <li><a onclick="location.reload()" class="${linkClass}">Übersicht</a></li>
                <li><a href="#" class="${linkClass}">Meine Tickets</a></li>
                <li><a href="#" class="${linkClass}">Dokumente</a></li>
                <li><a href="#" class="${linkClass}">Schwarzes Brett</a></li>
            `;
        }
    }

    async function loadTenants() {
        const container = document.getElementById('content-area');
        container.className = "space-y-8 col-span-full";
        
        container.innerHTML = `
            <div class="bg-white p-8 shadow-sm border-t-2 border-hb-olive">
                <h2 class="text-xl font-bold mb-6 uppercase tracking-wider">Neue Einheit anlegen</h2>
                <form id="apartment-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Wohnungsnummer</label>
                        <input type="text" id="apt_no" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="z.B. EG Links" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Kaltmiete (€)</label>
                        <input type="number" id="rent" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-hb-olive mb-2">Nebenkosten (€)</label>
                        <input type="number" id="utils" class="w-full border-b border-gray-200 p-2 focus:outline-none focus:border-hb-olive" placeholder="0.00">
                    </div>
                    <div class="md:col-span-3">
                        <button type="submit" class="bg-hb-offblack text-white px-8 py-3 text-xs uppercase tracking-[0.2em] hover:bg-hb-olive transition-colors">Einheit Speichern</button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-8 shadow-sm border-t-2 border-hb-olive">
                <h2 class="text-xl font-bold mb-6 uppercase tracking-wider">Bestands-Einheiten</h2>
                <div id="tenants-list" class="divide-y divide-gray-100">
                    <p class="text-gray-400 italic text-sm">Lade Einheiten...</p>
                </div>
            </div>
        `;

        // Event Listener für das Formular (Speichern-Logik bauen wir gleich ein)
        document.getElementById('apartment-form').addEventListener('submit', handleAddApartment);
        
        fetchApartments();
    }

    async function fetchApartments() {
        const { data, error } = await _supabase.from('apartments').select('*');
        const list = document.getElementById('tenants-list');
        
        if (data && data.length > 0) {
            list.innerHTML = data.map(apt => `
                <div class="py-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-lg text-hb-offblack">${apt.apartment_number}</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Miete: ${apt.rent_amount}€ | NK: ${apt.utilities_amount}€</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] px-2 py-1 bg-hb-ultralight text-hb-olive font-bold uppercase">Aktiv</span>
                    </div>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<p class="text-gray-400 text-sm">Noch keine Einheiten angelegt.</p>';
        }
    }

    async function handleAddApartment(e) {
        e.preventDefault();
        const apt_no = document.getElementById('apt_no').value;
        const rent = document.getElementById('rent').value;
        const utils = document.getElementById('utils').value;

        const { error } = await _supabase.from('apartments').insert([
            { apartment_number: apt_no, rent_amount: rent, utilities_amount: utils }
        ]);

        if (error) {
            alert("Fehler beim Speichern: " + error.message);
        } else {
            loadTenants(); // Liste neu laden
        }
    }

    async function logout() {
        await _supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    init();
</script>
</body>
</html>
