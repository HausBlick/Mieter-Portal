<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Verwaltung | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F5F5F5',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #sidebar { transition: transform 0.3s ease-in-out; }
        .active-link { background-color: #F5F5F5; border-left-color: #687451 !important; }
        input::placeholder { color: #d1d5db; }
    </style>
</head>
<body class="bg-hb-ultralight font-sans text-hb-offblack min-h-screen flex flex-col md:flex-row">

    <!-- MOBILE HEADER -->
    <div class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-50">
        <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-8 w-auto">
        <button onclick="toggleMenu()" class="text-hb-olive p-2 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <!-- SIDEBAR -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-200 flex-shrink-0 min-h-screen flex flex-col shadow-sm">
        <div class="p-8 border-b border-gray-100 hidden md:block text-center">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-16 w-auto mx-auto mb-4">
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-hb-olive">Portal Management</p>
        </div>
        
        <div class="flex-grow p-6 pt-16 md:pt-6">
            <ul class="space-y-1" id="nav-links">
                <!-- Navigation -->
            </ul>
        </div>

        <div class="p-8 border-t border-gray-100">
            <button onclick="logout()" class="text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-hb-orange transition-colors">
                Abmelden
            </button>
        </div>
    </nav>

    <!-- OVERLAY (Mobil) -->
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-grow p-6 md:p-12 lg:p-16">
        <header class="mb-10 md:mb-16">
            <p id="role-label" class="text-[10px] uppercase tracking-[0.2em] font-bold text-hb-olive mb-2"></p>
            <h1 id="welcome-title" class="text-3xl md:text-5xl font-bold tracking-tight text-hb-offblack italic">Lade...</h1>
        </header>

        <div id="content-area" class="w-full space-y-12">
            <!-- Content -->
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentEditingId = null;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (!profile) return;

            document.getElementById('welcome-title').textContent = profile.full_name;
            document.getElementById('welcome-title').classList.remove('italic');
            document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';

            renderNav(profile.role);
            if (profile.role === 'admin') loadTenants();
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            const linkClass = "block p-3 text-sm font-medium hover:bg-hb-ultralight transition-all border-l-4 border-transparent hover:border-hb-olive cursor-pointer mb-1";
            
            if (role === 'admin') {
                nav.innerHTML = `
                    <li><a onclick="location.reload()" class="${linkClass}">Übersicht</a></li>
                    <li><a onclick="loadTenants(); if(window.innerWidth < 768) toggleMenu();" class="${linkClass} active-link">Einheiten & Zähler</a></li>
                    <li class="pt-8 pb-2 px-3 text-[10px] uppercase tracking-widest font-bold text-gray-300">Verwaltung</li>
                    <li><a href="#" class="${linkClass}">Dokumenten-Cloud</a></li>
                    <li><a href="#" class="${linkClass}">Schwarzes Brett</a></li>
                `;
            }
        }

        async function loadTenants() {
            const container = document.getElementById('content-area');
            const { data: buildings } = await _supabase.from('buildings').select('*').order('name');
            const buildingOptions = buildings?.map(b => `<option value="${b.id}">${b.name}</option>`).join('') || '';

            container.innerHTML = `
                <div class="bg-white p-8 md:p-12 shadow-sm border-t-4 border-hb-olive">
                    <h2 id="form-title" class="text-xl font-bold mb-8 uppercase tracking-widest text-hb-offblack">Einheit erfassen</h2>
                    <form id="apartment-form" class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest">Objekt auswählen</label>
                                <select id="b_id" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive bg-white text-sm" required>
                                    <option value="" disabled selected>Bitte wählen...</option>
                                    ${buildingOptions}
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest">Wohnungsnummer</label>
                                <input type="text" id="apt_no" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="z.B. 1.OG Links" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-4">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest">Kaltmiete (€)</label>
                                <input type="number" id="rent" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="0.00" step="0.01">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest">Nebenkosten (€)</label>
                                <input type="number" id="utils" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="0.00" step="0.01">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-hb-olive tracking-widest">Fläche (m²)</label>
                                <input type="number" id="sq_m" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="0.0" step="0.1">
                            </div>
                        </div>

                        <div class="pt-8 border-t border-gray-50 text-center italic">
                             <p class="text-[10px] font-bold uppercase text-gray-300 mb-8 tracking-[0.3em]">Zählernummern-Zuordnung</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left not-italic">
                                <div class="space-y-2">
                                    <label class="block text-[10px] font-bold uppercase text-gray-400 tracking-widest">Stromzähler</label>
                                    <input type="text" id="m_elec" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="Nr.">
                                </div>
                                <div class="space-y-2">
                                    <label class="block text-[10px] font-bold uppercase text-gray-400 tracking-widest">Wasserzähler</label>
                                    <input type="text" id="m_water" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="Nr.">
                                </div>
                                <div class="space-y-2">
                                    <label class="block text-[10px] font-bold uppercase text-gray-400 tracking-widest">Wärmezähler</label>
                                    <input type="text" id="m_heat" class="w-full border-b-2 border-gray-100 p-3 focus:outline-none focus:border-hb-olive text-sm" placeholder="Nr.">
                                </div>
                            </div>
                        </div>

                        <div class="pt-10 flex flex-col md:flex-row justify-center gap-4">
                            <button type="submit" id="submit-btn" class="w-full md:w-auto bg-hb-offblack text-white px-16 py-5 text-xs uppercase tracking-[0.3em] font-bold hover:bg-hb-olive transition-all">
                                Einheit speichern
                            </button>
                            <button type="button" id="cancel-btn" onclick="resetForm()" class="hidden w-full md:w-auto bg-gray-200 text-gray-500 px-8 py-5 text-xs uppercase tracking-widest font-bold hover:bg-gray-300 transition-all">
                                Abbrechen
                            </button>
                        </div>
                    </form>
                </div>

                <div class="bg-white p-8 md:p-12 shadow-sm border-t-4 border-hb-olive">
                    <h2 class="text-xl font-bold mb-10 uppercase tracking-widest text-hb-offblack">Bestands-Liste</h2>
                    <div id="tenants-list" class="space-y-12">Lade Einheiten...</div>
                </div>
            `;
            document.getElementById('apartment-form').addEventListener('submit', handleSave);
            fetchApartments();
        }

        async function fetchApartments() {
            const { data, error } = await _supabase
                .from('apartments')
                .select('*, buildings (*), profiles:tenant_id (full_name)')
                .order('apartment_number');

            const list = document.getElementById('tenants-list');
            if (data && data.length > 0) {
                let currentB = "";
                list.innerHTML = data.map(apt => {
                    let header = "";
                    if (currentB !== apt.buildings?.name) {
                        currentB = apt.buildings?.name || "Nicht zugeordnet";
                        header = `
                            <div class="bg-hb-ultralight px-6 py-4 mt-12 mb-6 border-l-4 border-hb-olive text-balance text-left">
                                <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-hb-olive mb-1">${currentB}</p>
                                <p class="text-[9px] text-gray-400 uppercase tracking-widest font-medium">${apt.buildings?.address || ''}, ${apt.buildings?.zip_code || ''} ${apt.buildings?.city || ''}</p>
                            </div>`;
                    }
                    return header + `
                        <div class="flex flex-wrap justify-between items-start py-8 border-b border-gray-50 last:border-0 gap-6 group">
                            <div class="flex-1 min-w-[200px] text-left">
                                <h3 class="font-bold text-2xl text-hb-offblack tracking-tight mb-2">${apt.apartment_number}</h3>
                                <div class="flex flex-col gap-1">
                                    <p class="text-[10px] text-gray-500 uppercase tracking-[0.1em] font-semibold">
                                        Fläche: <span class="text-hb-offblack">${apt.sq_meters || '0'} m²</span>
                                    </p>
                                    <div class="flex items-center gap-2">
                                        <div class="w-1.5 h-1.5 rounded-full ${apt.profiles?.full_name ? 'bg-hb-olive' : 'bg-gray-200'}"></div>
                                        <p class="text-[10px] text-gray-500 uppercase tracking-[0.1em] font-semibold text-balance">
                                            Mieter: <span class="text-hb-offblack">${apt.profiles?.full_name || 'LEERSTEHEND'}</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                            <div class="w-full lg:w-auto grid grid-cols-3 gap-3 md:gap-6 bg-gray-50 p-5 border border-gray-100 min-w-[300px]">
                                <div><p class="text-[9px] uppercase text-gray-400 font-bold mb-1 text-balance text-center">Strom</p><p class="text-xs font-bold text-hb-offblack text-center">${apt.meter_electricity || '-'}</p></div>
                                <div><p class="text-[9px] uppercase text-gray-400 font-bold mb-1 text-balance text-center">Wasser</p><p class="text-xs font-bold text-hb-offblack text-center">${apt.meter_water || '-'}</p></div>
                                <div><p class="text-[9px] uppercase text-gray-400 font-bold mb-1 text-balance text-center">Wärme</p><p class="text-xs font-bold text-hb-offblack text-center">${apt.meter_heating || '-'}</p></div>
                            </div>
                            <div class="text-right min-w-[120px] flex flex-col justify-between items-end h-full">
                                <div>
                                    <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Gesamtmiete</p>
                                    <p class="text-xl font-bold text-hb-olive">${(parseFloat(apt.rent_amount || 0) + parseFloat(apt.utilities_amount || 0)).toFixed(2)} €</p>
                                </div>
                                <button onclick="editApartment('${apt.id}')" class="mt-4 text-[10px] uppercase font-bold text-hb-olive hover:text-hb-offblack transition-colors opacity-0 group-hover:opacity-100">
                                    Bearbeiten
                                </button>
                            </div>
                        </div>`;
                }).join('');
            } else {
                list.innerHTML = '<p class="py-12 text-center text-gray-400 italic text-sm text-balance">Keine Einheiten vorhanden.</p>';
            }
        }

        async function handleSave(e) {
            e.preventDefault();
            const payload = {
                building_id: parseInt(document.getElementById('b_id').value),
                apartment_number: document.getElementById('apt_no').value,
                rent_amount: parseFloat(document.getElementById('rent').value) || 0,
                utilities_amount: parseFloat(document.getElementById('utils').value) || 0,
                sq_meters: parseFloat(document.getElementById('sq_m').value) || 0,
                meter_electricity: document.getElementById('m_elec').value,
                meter_water: document.getElementById('m_water').value,
                meter_heating: document.getElementById('m_heat').value
            };

            if (currentEditingId) {
                const { error } = await _supabase.from('apartments').update(payload).eq('id', currentEditingId);
                if (error) alert("Fehler beim Aktualisieren: " + error.message);
                else resetForm();
            } else {
                const { error } = await _supabase.from('apartments').insert([payload]);
                if (error) alert("Fehler beim Speichern: " + error.message);
                else resetForm();
            }
            fetchApartments();
        }

        async function editApartment(id) {
            const { data: apt } = await _supabase.from('apartments').select('*').eq('id', id).single();
            if (apt) {
                currentEditingId = id;
                document.getElementById('b_id').value = apt.building_id;
                document.getElementById('apt_no').value = apt.apartment_number;
                document.getElementById('rent').value = apt.rent_amount;
                document.getElementById('utils').value = apt.utilities_amount;
                document.getElementById('sq_m').value = apt.sq_meters;
                document.getElementById('m_elec').value = apt.meter_electricity;
                document.getElementById('m_water').value = apt.meter_water;
                document.getElementById('m_heat').value = apt.meter_heating;
                
                document.getElementById('form-title').textContent = "Einheit bearbeiten";
                document.getElementById('submit-btn').textContent = "Änderungen speichern";
                document.getElementById('cancel-btn').classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetForm() {
            currentEditingId = null;
            document.getElementById('apartment-form').reset();
            document.getElementById('form-title').textContent = "Einheit erfassen";
            document.getElementById('submit-btn').textContent = "Einheit speichern";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        async function logout() { 
            await _supabase.auth.signOut(); 
            window.location.href = 'index.html'; 
        }
        
        init();
    </script>
</body>
</html>
