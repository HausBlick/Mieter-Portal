<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Verwaltung | Mieter-Portal Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F5F5F5',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-hb-ultralight font-sans h-screen flex items-center justify-center text-hb-offblack">

    <div class="bg-white p-10 rounded-none shadow-sm w-full max-w-md border-t-4 border-hb-olive">
        <div class="mb-8 flex justify-center">
            <div class="text-2xl font-bold tracking-tight">HB <span class="font-light text-hb-olive">Verwaltung</span></div>
        </div>
        
        <h1 class="text-xl font-semibold mb-6 text-center">Mieter-Portal Login</h1>
        
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs uppercase tracking-wider font-semibold text-hb-olive mb-1">E-Mail</label>
                <input type="email" id="email" class="w-full border border-gray-200 rounded-none p-3 focus:outline-none focus:border-hb-olive transition-colors" placeholder="ihre@email.de" required>
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider font-semibold text-hb-olive mb-1">Passwort</label>
                <input type="password" id="password" class="w-full border border-gray-200 rounded-none p-3 focus:outline-none focus:border-hb-olive transition-colors" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-hb-olive text-white font-medium py-3 px-4 rounded-none hover:bg-opacity-90 transition duration-200 uppercase text-sm tracking-widest">
                Anmelden
            </button>
        </form>
        <p id="error-msg" class="text-hb-orange text-sm mt-4 hidden text-center font-medium"></p>
    </div>

<script>
    // Hier DEINE Daten einfügen
    const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
    const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
    
    // KORREKTUR: Der Aufruf muss "supabase.createClient" lauten
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        console.log("Anmeldeversuch für:", email);

        const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            console.error("Fehler gefunden:", error.message);
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = "Fehler: " + error.message;
            errorEl.classList.remove('hidden');
        } else {
            console.log("Login erfolgreich!", data);
            // Wir warten kurz, damit die Session sicher gespeichert ist
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        }
    });
</script>
</html>
