<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Verwaltung | Mieter-Portal Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F5F5F5',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-hb-ultralight font-sans h-screen flex items-center justify-center text-hb-offblack">

    <div class="bg-white p-10 rounded-none shadow-sm w-full max-w-md border-t-4 border-hb-olive text-center">
        <img src="HB_icon_olive_RGB.svg" alt="HB Verwaltung Logo" class="h-20 w-auto mx-auto mb-6">
        
        <h1 class="text-xl font-semibold mb-8 uppercase tracking-widest text-hb-offblack">Mieter-Portal</h1>
        
        <form id="login-form" class="space-y-5 text-left">
            <div>
                <label class="block text-xs uppercase tracking-wider font-bold text-hb-olive mb-2">E-Mail Adresse</label>
                <input type="email" id="email" class="w-full border border-gray-200 rounded-none p-3 focus:outline-none focus:border-hb-olive transition-colors" placeholder="beispiel@email.de" required>
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider font-bold text-hb-olive mb-2">Persönliches Passwort</label>
                <input type="password" id="password" class="w-full border border-gray-200 rounded-none p-3 focus:outline-none focus:border-hb-olive transition-colors" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-hb-olive text-white font-medium py-4 px-4 rounded-none hover:bg-opacity-90 transition duration-200 uppercase text-xs tracking-[0.2em]">
                Anmelden
            </button>
        </form>
        <p id="error-msg" class="text-hb-orange text-sm mt-6 hidden font-medium"></p>
    </div>

    <script>
        // Deine fest hinterlegten Supabase-Daten
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                const errorEl = document.getElementById('error-msg');
                errorEl.textContent = "Anmeldung fehlgeschlagen: " + error.message;
                errorEl.classList.remove('hidden');
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
